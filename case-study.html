  <template id="case-hcai">
    <section>
      <p class="drop-cap"><strong>Designing for Humans</strong> is a Human-Centered AI (HCAI) research framework I authored at EF World Journeys. It's the rubric I use to decide whether AI belongs in a flow, what shape it should take when it does, and how to keep the human in control of the decision the AI is informing.</p>
      <p>The thesis: augment human capability. Don't replace it.</p>
    </section>

    <h2>Humans in the Group; Computers in the Loop</h2>
    <p>The traditional model puts AI at the center and humans on the edges — one model, many humans served by it. HCAI inverts the geometry: humans at the center, with multiple AI tools deployed around them as loops they can step into and out of. Non-deterministic systems require a human-centered buffer against unpredictability.</p>

    <h2>The P.O.N.T.E. Evaluation</h2>
    <p>A five-step rubric to determine whether AI adds unique value in a given flow. If the answer to any of these is shaky, the AI surface probably shouldn't ship.</p>
    <ul>
      <li><strong>P — Patterns.</strong> Is there an identifiable pattern of user behavior with data behind it? Or are we projecting an AI use-case onto a flow that doesn't actually have the volume to learn from?</li>
      <li><strong>O — Outcome.</strong> What is the definition of success? Which OKRs does this affect? How do we measure user satisfaction beyond a thumbs-up button?</li>
      <li><strong>N — Need.</strong> Can a non-AI solution work better? What were the limitations of the traditional system, and does AI offer something genuinely unique — or does it just feel like a more impressive answer?</li>
      <li><strong>T — Type.</strong> Automation (speed) vs. augmentation (creativity)? Automation replaces tasks; augmentation makes humans better at tasks they already do. The wrong choice between them is the most common reason AI features fail.</li>
      <li><strong>E — Equity.</strong> How do we ensure fairness and reduce bias? A tour-recommendation AI that keeps surfacing the same ten itineraries while ignoring the catalog's tail is an equity failure, not just a UX one.</li>
    </ul>

    <h2>Case in Point — Price Predictions</h2>
    <p>Google Flights' "lower than usual" pricing badge is a textbook HCAI surface. The AI predicts; the human decides. Travelers stuck in re-check loops ("what if it gets cheaper?") get a confidence signal — but the action and the consequence stay with the human. The AI never books for them. It compresses uncertainty without eliminating agency.</p>
    <blockquote>Key takeaway: the AI predicts, but the human decides. That's the essence of HCAI — augmentation over automation.</blockquote>

    <h2>Six Principles for Implementation</h2>
    <ul>
      <li><strong>Transparency.</strong> Explain why the AI made the suggestion. Clear explanations for decisions and actions.</li>
      <li><strong>Accountability.</strong> Clear lines of responsibility for AI errors. Organizations stay accountable for impacts.</li>
      <li><strong>Privacy.</strong> Data used ethically with consent. Strict adherence to privacy standards.</li>
      <li><strong>Human autonomy.</strong> Empower users by enhancing their abilities; provide control over AI-assisted processes.</li>
      <li><strong>Beneficence.</strong> Aim to benefit individuals and society. Improve well-being. Avoid harm.</li>
      <li><strong>Accessibility.</strong> Intuitive, user-friendly interfaces — across abilities and backgrounds.</li>
    </ul>

    <h2>Where It's Deployed</h2>
    <p>HCAI is the rubric that shaped the EF AI-assisted intent capture prototype — a sentence-builder that turns vague preferences ("I want to explore somewhere warm in spring") into structured intent grounded in real inventory. The system returns confidence scores and fallback behavior; it never recommends a tour that doesn't exist. Augmentation, not autopilot.</p>
    <blockquote>"Our goal is not to have or use AI but to ensure we all understand it as a tool for solving our problems."</blockquote>

    <h2>References</h2>
    <ul>
      <li>Ben Shneiderman — <em>Human-Centered AI</em>.</li>
      <li>Google PAIR — <em>People + AI Guidebook</em>.</li>
      <li>European Commission (2019) — <em>EU Guidelines on Trustworthy AI</em>.</li>
      <li>IEEE — <em>Ethically Aligned Design</em>.</li>
      <li>Stuart Russell — <em>Human Compatible: AI and the Problem of Control</em>.</li>
      <li>Gary Marcus &amp; Ernest Davis — <em>Rebooting AI</em>.</li>
    </ul>

    <h2>The brief, in plain English</h2>
    <p>"What's the temperature, right now, at the most extreme places on earth?" Lut Desert. Vostok Station. Death Valley. Oymyakon. Places most people will never go and most reporting never reaches. The page surfaces them as a moodpiece — not a weather forecast. The job is to make the numbers <em>feel</em> as extreme as they are.</p>

    <h2>The decision that mattered: dropping the live feeds</h2>
    <p>The original concept paired each extreme with the <em>nearest watchable live feed</em> — a YouTube Live stream or Windy webcam from the closest populated place. The pitch was good: "the hottest place on earth has no camera; here's the closest one, 480 km southwest." That distance was the charm.</p>
    <p>Three things killed it:</p>
    <ul>
      <li><strong>YouTube Live URLs die.</strong> Streams go offline, channels get rate-limited, embeds get age-gated. The YouTube Data API can search for live videos but the results are flaky and require a key. Building on top of that means a page that breaks weekly.</li>
      <li><strong>Windy needs a key + has TOU constraints</strong> on embedding outside their ecosystem. Lower coverage in the actual extreme places.</li>
      <li><strong>Honesty.</strong> The placeholder feed handles I'd designed with (<code>@persiangulflive</code>, <code>@cataniacam</code>) were illustrative — none of them existed. Shipping illustrative handles in production-looking chrome is the opposite of receipts.</li>
    </ul>
    <p>Killed the feed concept entirely. The piece is now a pure "extreme temperatures, right now." Smaller scope, fully honest, far more durable. The atmospheric backdrops stayed — they're visual mood, never pretending to be video.</p>

    <blockquote>The cleanest version of an idea is usually the one you arrive at by removing things, not adding.</blockquote>

    <h2>Architecture</h2>
    <p>Three parts. None of them complicated.</p>

    <h3>1 · The cron — Open-Meteo as the data source</h3>
    <p>Open-Meteo's ERA5 forecast endpoint is free, has no auth, and gives current temperature plus the last 24 hours of hourly readings for any lat/lon. A Node script in <code>scripts/scrape-hot-cold.mjs</code> walks a curated registry of 14 canonical extremes (one hot + one cold per continent) and pulls the live numbers. Fourteen API calls, ~1.4 seconds.</p>
<pre><code>const u = new URL('https://api.open-meteo.com/v1/forecast');
u.searchParams.set('latitude',  lat);
u.searchParams.set('longitude', lon);
u.searchParams.set('current',   'temperature_2m');
u.searchParams.set('hourly',    'temperature_2m');
u.searchParams.set('past_hours', '24');</code></pre>
    <p>The script picks max/min per continent, derives "world" as the cross-continent winner, and writes <code>hot-cold/data.json</code>.</p>

    <h3>2 · The schedule — GitHub Actions, every 15 minutes</h3>
    <p>A workflow file (<code>.github/workflows/hot-cold-scrape.yml</code>) runs the scraper on a <code>*/15 * * * *</code> cron, commits the JSON if it changed, and pushes. Vercel auto-redeploys on every push. The whole pipeline costs zero dollars and zero per-visitor API calls — the page loads a static JSON file like any other static asset, so it can't get rate-limited even if it goes viral.</p>
<pre><code>on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}</code></pre>
    <p>Same pattern as the Mamdani Mapper scraper that already runs on the same site. Reuse beats invention.</p>

    <h3>3 · The page — vanilla JS, Mapbox GL, no framework</h3>
    <p>Standalone <code>hot-cold.html</code> + <code>.css</code> + <code>.js</code>. No build step, no React, no bundler — just the cobalt design tokens inlined in CSS, Mapbox GL JS for the locator, and a tiny render loop. On load, the page fetches the cached JSON; on failure it falls back to an embedded fixture so the UI never breaks. Total wire weight is well under a hundred kilobytes excluding Mapbox tiles.</p>

    <h2>Design system</h2>
    <p>Cobalt — the second of the two systems on raghavahuja.com (the older terracotta direction lives on the rest of the site). Type pairing is Fraunces (italic display) × Geist (body) × JetBrains Mono (chrome). Accent <code>#5b8cff</code> on paper <code>#0c0c0e</code>. Hot uses a restrained ember <code>#c8553d</code>; cold reuses cobalt as its color, so the system stays disciplined — only one warm accent in the whole palette.</p>
    <p>The huge italic Fraunces temperatures over atmospheric backdrops are doing most of the work. Everything else is chrome that gets out of the way: monospaced micro-labels, hairline rules, no chrome on the temperatures themselves except a small <code>↑</code> or <code>↓</code> arrow.</p>

    <h2>The world locator</h2>
    <p>Bottom-center floating card — Mapbox GL with the <code>dark-v11</code> style, two markers per region (hollow ring for the extreme location, color-keyed to hot or cold), and a continent cycler. The map fits its bounds to the active continent's bbox so the framing always tells you where on earth you are. Auto-cycle option flips through all eight regions every six seconds for the lobby-screen feel.</p>

    <h2>What's next</h2>
    <ul>
      <li><strong>Extensible to other extremes.</strong> The top tabs already render <em>wind / rain / uv</em> as "soon." Open-Meteo returns those fields from the same endpoint — adding them is a render variation, not new infrastructure.</li>
      <li><strong>Bigger candidate registry.</strong> Right now it's one hot + one cold per continent. A wider candidate pool (twenty per continent) would catch true daily winners that aren't always the canonical spots.</li>
      <li><strong>OG image.</strong> A dedicated 1200×630 share card. The split red/blue is unusually well-suited to a static OG.</li>
    </ul>

    function b64ToBytes(b64) {
      const bin = atob(b64);
      const out = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
      return out;
    }

    async function decryptLocked(slug, password) {
      const { iv, salt, ciphertext } = LOCKED[slug];
      const baseKey = await crypto.subtle.importKey(
        'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey'],
      );
      const key = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: b64ToBytes(salt), iterations: 250000, hash: 'SHA-256' },
        baseKey,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt'],
      );
      const plainBuf = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv: b64ToBytes(iv) },
        key,
        b64ToBytes(ciphertext),
      );
      return new TextDecoder().decode(plainBuf);
    }

    function mountEfGate(bodyEl) {

      const cached = sessionStorage.getItem('ef:unlocked');

      const gateTpl = document.getElementById('case-ef-gate');

      const err = document.getElementById('ef-gate-err');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        err.textContent = '';
        const pw = input.value.trim();
        if (!pw) { err.textContent = 'enter the password'; return; }
        try {
          const html = await decryptLocked('ef', pw);
          try { sessionStorage.setItem('ef:unlocked', html); } catch (e) {}
          bodyEl.innerHTML = html;
        } catch (_) {
          err.textContent = 'wrong password — check the email';
          input.select();
        }
      });
      requestAnimationFrame(() => input.focus());
    }

    // prev / next case nav
    const idx = ORDER.indexOf(slug);
    const prev = idx > 0 ? ORDER[idx - 1] : null;
    const next = idx >= 0 && idx < ORDER.length - 1 ? ORDER[idx + 1] : null;
    const nav = document.getElementById('cs-nav');
    const prevLink = prev
      ? `<a href="case-study.html?slug=${prev}"><span class="label">← previous</span>${CASES[prev].title}</a>`
      : `<a href="work.html" style="color: var(--fg-muted);"><span class="label">← index</span>all work</a>`;
    const nextLink = next
      ? `<a href="case-study.html?slug=${next}"><span class="label">next →</span>${CASES[next].title}</a>`
      : `<a href="contact.html" style="color: var(--accent);"><span class="label">end</span>say hi →</a>`;
    nav.innerHTML = prevLink + nextLink;

    // ===== table of contents (desktop only, auto-generated from h2s) =====
    (function buildToc() {
      const bodyEl = document.getElementById('cs-body');
      const tocList = document.getElementById('case-toc-list');
      const tocWrap = document.getElementById('case-toc');
      const layout = document.getElementById('case-layout');
      // Wait a tick for the body template to be injected first.
      requestAnimationFrame(() => {
        const headings = Array.from(bodyEl.querySelectorAll('h2'));
        if (headings.length < 3) return; // short pages (EF gate, social-booth) don't need a TOC
        headings.forEach((h, i) => {
          const id = 'sec-' + (h.textContent || ('section-' + i))
            .toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
          h.id = id;
          const li = document.createElement('li');
          li.dataset.id = id;
          li.innerHTML = `<a href="#${id}">${h.textContent}</a>`;
          tocList.appendChild(li);
        });
        layout.classList.add('has-toc');
        // active-section highlight via IntersectionObserver
        const lis = Array.from(tocList.querySelectorAll('li'));
        const byId = new Map(lis.map((li) => [li.dataset.id, li]));
        const io = new IntersectionObserver((entries) => {
          // Find the topmost entry whose top is above 30% viewport
          const visible = entries
            .filter((e) => e.isIntersecting)
            .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
          if (visible.length) {
            lis.forEach((li) => li.classList.remove('active'));
            const active = byId.get(visible[0].target.id);
            if (active) active.classList.add('active');
          }
        }, { rootMargin: '-20% 0px -70% 0px', threshold: 0 });
        headings.forEach((h) => io.observe(h));
      });
    })();

    // reading progress + fire read-complete once per case per session
    const progressBar = document.getElementById('case-progress-bar');
    let readFired = false;
    function onScroll() {
      const h = document.documentElement;
      const scrolled = h.scrollTop;
      const max = h.scrollHeight - h.clientHeight;
      const pct = max > 0 ? Math.min(100, (scrolled / max) * 100) : 0;
      progressBar.style.width = pct + '%';
    }
    document.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  </script>

  <script src="site.js" defer></script>
</body>
