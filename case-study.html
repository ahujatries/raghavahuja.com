       ARQO
       ============================================== -->
  <template id="case-arqo">
    <section>
      <p class="drop-cap"><strong>Arqo is a mobile-first screenwriting app</strong> I shipped solo in nine days of after-work building, using an agentic-dev workflow with Claude Code. It's a custom contenteditable screenplay editor, a deterministic line-by-line paginator running in a web worker, a lossless FDX v2 parser and writer that round-trips against the Final Draft and WriterDuet fixtures, an offline-first IndexedDB architecture with an autosave outbox, a real-time collaboration layer built on Liveblocks + Yjs CRDTs, three synchronized editor surfaces on mobile (Flow, Beats, Pages), a 777-script Library embedded with pgvector for Voice Fingerprint and Continuity Reader AI, a Tauri desktop shell, and Capacitor mobile scaffolding.</p>
      <p>Arqo is not a Final Draft clone with AI stapled on. It is a re-architecture of the entire pre-production workflow — writing, structure, shot-listing, teleprompter, NLE export — around the premise that every film, in every language, starts with a script, and no existing tool treats the script as the source of truth across the full pipeline.</p>
      <p>This case study documents the architectural decisions, the trade-offs I made explicit before writing code, the pivots I made when reality pushed back, and the things I deliberately did not build — because the product's discipline is at least as important as its feature list.</p>
    </section>

    <p style="font-family: var(--font-mono); font-size: var(--fs-meta); color: var(--mute); text-transform: lowercase; letter-spacing: 0.04em; margin-top: 28px;">
      co-founded with <a href="https://isabellavizetta.com" target="_blank" rel="noopener" style="color: var(--accent); text-decoration: none; border-bottom: 1px solid color-mix(in srgb, var(--accent) 40%, transparent);">isabella vizetta</a>.
    </p>

    <h2>The Problem</h2>

    <h3>Screenwriting software is stuck in 1992</h3>
    <p>Final Draft has shipped the same mental model for thirty years: one view of the document, one file format (FDX), desktop-only, $250 one-time, UI that reads like a 1999 newsroom tool. It has ~150K active users globally and runs at roughly $30M ARR — a genuinely good business on a category that has stopped evolving.</p>
    <p>WriterDuet moved to the browser but punted on mobile. Arc Studio ships a beautiful beatboard but can't export a studio-grade PDF. Celtx has effectively abandoned modern UX. Highland 2 is Mac-only. Sudowrite Muse is AI-first but not actually a screenwriting tool.</p>
    <p>None of them serve the writer who opens their laptop, their phone on the subway, and their iPad at a coffee shop in the same day. None of them serve the filmmaking creator who isn't a union screenwriter but scripts every video. None of them serve the writing partner in Mumbai whose collaborator is in Los Angeles. The category has a fifteen-year feature debt.</p>

    <h3>The mobile gap is where the next generation of creators lives</h3>
    <p>There are ~150K professional screenwriters globally. There are 2–4M paying filmmaking creators. That second number is the real TAM. Every existing tool treats the phone as a review surface, never a writing surface — and that's where a whole generation of creators is already working.</p>

    <h3>The multilingual gap is larger than the English gap</h3>
    <p>Every competitor ships English-first, with locale packs as an afterthought. The real addressable creator base across nine languages (EN, ES, FR, PT, Hindi, Indonesian, Turkish, Mandarin-diaspora, Cantonese) is 7–14M paying users, not 2–4M. Hindi, Spanish, and Portuguese alone are ~4–7M of that. No competitor serves them seriously.</p>

    <h3>The AI gap is a values question, not a feature question</h3>
    <p>Every AI screenwriting product I looked at frames AI as a replacement — paste a prompt, get a scene, copy it into your document, watch your voice vanish into GPT mean. That is the easiest product to build and the worst product to ship, because creators know it flattens voice and because without humans there is no product. The opportunity is AI as an amplifier — operating on what the human wrote, surfacing craft patterns, proposing alternatives in the writer's own voice. Nobody in category is executing this well.</p>

    <blockquote>What if the script were the operating system of the filmmaking workflow, not just a deliverable? What if every downstream surface — shot list, teleprompter, edit, thumbnail, production schedule — traced back to a line in the script, with zero double-entry and zero loss of fidelity?</blockquote>

    <h2>The Solution</h2>

    <h3>1. The script as single source of truth</h3>
    <p>Every Arqo document is a structured AST, not a blob of text. Each element (scene heading, action, character, parenthetical, dialogue, transition) has a typed node. Every downstream artefact — shot list entry, teleprompter line, NLE export marker, production report row — is a projection of the AST, not a parallel representation. Edit a line of dialogue, the shot list updates. Move a scene, every downstream report updates.</p>
    <p>This is the architectural decision that makes everything else possible. It's also the decision that makes Arqo categorically different from every competitor, which treats the script as one format among many with import/export boundaries between surfaces.</p>

    <h3>2. Three synchronized editor surfaces on mobile — the only tool that does this</h3>
    <p><strong>Flow</strong> — the beatboard. Cards for every beat, draggable, filterable, colour-coded by act. Where the story is shaped.</p>
    <p><strong>Beats</strong> — the structure view. The same document mapped against a chosen framework (Save the Cat, Story Circle, Three-Act, Hero's Journey, 8 more) with live percentage markers. Where structure is audited.</p>
    <p><strong>Pages</strong> — the industry-format view. Courier 12, 55 lines/page, MORE/CONT'D, dual dialogue, locked scene numbers + A/B, revision marks in the Blue → Pink → Yellow → Green → Goldenrod → Buff → Salmon → Cherry rotation. What prints and what exports.</p>
    <p>All three on mobile. All three on the same document. No competitor ships this combination anywhere, let alone on phones.</p>

    <h3>3. Professional and creator tiers in one product</h3>
    <p>Same codebase, same document model, different feature surfacing. A WGA screenwriter uses Pages, FDX export, revision marks, locked scene numbers, and collab. A YouTuber uses Flow, teleprompter, shot list, NLE export, and Creator AI. The underlying engine is identical. The tier surfaces what each audience needs. This is the single architectural bet that lets a solo-to-lean team serve a 7–14M TAM.</p>

    <h3>4. Global from day one</h3>
    <p>i18n is not an afterthought. The editor, paginator, PDF generator, and FDX layer all accept locale presets (Indian code-switch between Devanagari and Latin, European-French vs. creator-French conventions, Traditional vs. Simplified Chinese). Pricing is PPP-indexed from launch. Payment rails include Stripe, Razorpay (India), PIX (Brazil), and Mada (intended for later Gulf expansion, deferred).</p>

    <h2>Product Architecture</h2>

    <h4>document model</h4>
<pre><code>ScreenplayDocument
├── meta (title, author, draft version, revision colour, locked flag)
├── structure
│   ├── acts[]
│   ├── beats[]        → references to nodes
│   └── framework      (optional — Save the Cat, Story Circle, etc.)
├── elements[]
│   ├── SceneHeading   { int_ext, location, time, number, locked }
│   ├── Action         { text: RichText }
│   ├── Character      { name, extension }
│   ├── Parenthetical  { text }
│   ├── Dialogue       { text: RichText, dual: DialogueRef | null }
│   └── Transition     { text }
├── revisions[]        // immutable revision stamps
├── shotList[]         → references to elements
└── production         (DOOD, locations, characters, actors)</code></pre>
    <p>Every element carries a stable ID. Revisions are immutable — a revision doesn't mutate the element, it creates a stamp that layers over it. The FDX exporter walks the AST and emits valid Final Draft XML. The PDF exporter walks the same AST through the paginator.</p>

    <h3>View composition</h3>
    <p>Each of Flow, Beats, and Pages is a stateless projection of the AST. Opening a second view doesn't duplicate state — it subscribes to the same document store. Edits propagate through a single write path; every view re-derives its render. This is the "one state, many views" pattern most apps pay lip service to and then violate. Arqo enforces it at the type level.</p>

    <h3>Sync layer</h3>
    <p>The editor state lives locally (Zustand store), mirrored into IndexedDB (for offline), and for shared projects into a Yjs CRDT running through a Liveblocks provider. Writes are local-first; a background queue reconciles with the server when online. Conflict resolution is handled by the CRDT — no manual merge UI required for element-level edits.</p>

    <h2>Engineering Deep-Dives</h2>

    <h3>1. The Custom Contenteditable Editor</h3>
    <h4>why custom, not lexical / prosemirror / slate</h4>
    <p>I evaluated all three. ProseMirror's collaborative model is excellent, but its schema ergonomics for a fixed set of screenplay element types felt over-general and under-tuned. Lexical's plugin model is better but its paginator story is weak — pagination requires deterministic layout knowledge the editor doesn't natively expose. Slate is too unopinionated for the kind of input-mode cycling I needed (TAB to cycle element types, ENTER to infer next element from current). The screenplay-element input grammar — TAB on empty line cycles SCENE→ACTION→CHARACTER→DIALOGUE→TRANSITION; ENTER after CHARACTER goes to DIALOGUE; ENTER after DIALOGUE goes to ACTION — is idiosyncratic enough that I wanted direct control over the keydown pipeline.</p>
    <h4>the actual implementation</h4>
    <p>A contenteditable root, a normalised input layer that intercepts every keydown and translates to an action (<code>insertElement</code>, <code>cycleElementType</code>, <code>splitAt</code>, <code>mergeWith</code>), and a React render layer that reconciles the DOM from the AST rather than letting contenteditable's native behaviour drift. The input normalisation layer handles TAB cycling, ENTER inference, scene-heading and character auto-caps, smart parenthetical wrapping, paste normalisation (pasted text is typed, element types inferred from content patterns), and iOS keyboard quirks (which drove ~2 days of bug-fixing alone).</p>
    <blockquote>The cost is ~2,000 lines of editor code I now own forever. The benefit is a deterministic contract between editor and paginator that will save orders of magnitude of bugs downstream.</blockquote>

    <h3>2. The Deterministic Line-by-Line Paginator</h3>
    <p>Every production-grade screenwriting peer ships a line-by-line paginator. My original <code>words ÷ 250</code> shortcut worked for prototypes and broke on real scripts — scene headings, dialogue blocks, and dual-dialogue tables each have their own line-budgeting rules that word-count approximations destroy.</p>
<pre><code>AST → Paginator Worker → Laid-out Pages → Renderer

Paginator responsibilities:
1. Walk every element in order
2. Apply Courier-12 metrics (60 chars/line body, per-type widths)
3. Element-specific layout rules:
   - Scene headings: 1 line, no break
   - Action: word-wrap at 60, break allowed
   - Character: 1 line, NEVER break before next dialogue
   - Dialogue: wrap at 34, break emits (MORE)/(CONT'D)
   - Dual dialogue: two cols, budgeted separately
   - Parentheticals: 26 char wrap
4. Budget against 55 lines/page
5. Widow/orphan suppression
6. Emit (MORE) at page bottom, (CONT'D) at next page top
7. Emit page numbers, scene numbers, revision marks</code></pre>
    <h4>why a web worker</h4>
    <p>The paginator runs on every keystroke in a long document. On a 120-page script with 2,000+ elements, running on the main thread drops frames. Offloading to a worker — with transferable AST snapshots to avoid serialisation cost — keeps the editor at 60fps even during cold-start re-pagination.</p>
    <p>Snapshot testing: the paginator is validated against a hand-verified 120-page screenplay fixture. Every change runs the fixture and diffs page boundaries. Regressions that would silently break real scripts are caught in CI.</p>

    <h3>3. Lossless FDX v2 Round-Trip</h3>
    <p>FDX is the XML format every studio accepts. Like most XML formats that matured over 20 years, it is a minefield of undocumented edge cases. Arqo's parser and writer preserve:</p>
    <ul>
      <li>Formatting runs (bold, italic, underline) nested inside elements.</li>
      <li><code>&lt;DualDialogue&gt;</code> pairs with correct column assignment and turn order.</li>
      <li><code>&lt;SceneProperties Locked Number&gt;</code> for production scripts, including A/B/AA/AB scene numbers.</li>
      <li><code>&lt;Text RevisionID&gt;</code> stamps that cite the revision colour they belong to.</li>
      <li>Title page metadata, character extensions (V.O., O.S., CONT'D), custom transitions.</li>
      <li>Action-line images and inline notes.</li>
    </ul>
    <p>The round-trip test: Arqo document → FDX export → parse back → diff against original AST. If the diff is non-empty, the round-trip failed. Same test runs against real studio-generated FDX files (the WriterDuet interchange fixture and two production scripts I have access to under NDA).</p>
    <blockquote>Instead of writing a parser for each Final Draft version, I wrote a tolerant parser that accepts any conformant FDX and normalises it into the Arqo AST; the writer always emits FDX 12. Every document that enters Arqo leaves Arqo in a modern format.</blockquote>

    <h3>4. Real-Time Collaboration: Liveblocks + Yjs</h3>
    <p>Liveblocks provides the infrastructure I didn't want to build — WebSocket server, auth, presence primitives, room lifecycle. Yjs provides the CRDT guarantees — element-level concurrent edits, conflict-free merge, multi-user undo/redo. Liveblocks has native Yjs integration, so I get both without writing the provider from scratch.</p>
    <p>The migration threshold is pre-designed. For Team-tier indie writers Liveblocks is fine; for Studio-tier customers that demand collab data inside their VPC, swapping Liveblocks for a self-hosted Yjs provider (y-websocket or Hocuspocus) is a provider swap, not a data migration. I documented the threshold criteria in <code>docs/collab-decision.md</code> so the decision isn't left to founder panic later.</p>
    <p>Presence without leaking context: cursor position is a Liveblocks presence update. Current selection is presence. <em>Current view</em> (Flow / Beats / Pages) is presence — so when a collaborator is in Beats mode, their cursor is shown as a beat-card highlight, not a phantom cursor in Pages. This cross-view presence model is unique to Arqo and only works because the document is a single AST, not three parallel representations.</p>

    <h3>5. Offline-First Architecture</h3>
    <p>Writers write on planes. Writers write on subways. Writers write in cafés with bad WiFi. Any tool that's online-only immediately fails a real-world usability test.</p>
    <p>Every write goes to IndexedDB first. A background autosave outbox reconciles with the server when online. For the offline-only use case (NDA-grade scripts that the server is never allowed to see), I shipped a "Private Draft" project type — local-only, encrypted at rest, never synced.</p>
    <p>The IndexedDB schema has separate object stores for documents, pending_writes, revisions, and local_only_drafts. Cursor-based pagination over the pending queue means replay after a long offline session is O(n) in pending writes, not O(n²).</p>

    <h3>6. PDF Generation — Industry-Standard Output</h3>
    <p>Agents reject non-standard PDFs. "Close to Final Draft" will bounce. The bar is: Courier 12, exact margins (1.5" left, 1" elsewhere), 55 lines per page, proper element positioning, MORE/CONT'D at breaks, page numbers in header, scene numbers in both gutters for production scripts.</p>
    <p>I walked the paginator output through <code>pdf-lib</code>, rendering each element at computed coordinates. Courier was embedded as a Type 1 font (not system Courier — output must be identical across OS) so the PDF renders identically on a reviewer's Mac, PC, and Linux machine. Revision marks are rendered as asterisks in the right gutter, coloured to match the revision colour.</p>

    <h3>7. AI Architecture with pgvector</h3>
    <p>AI works on what the writer has already written. No AI surface generates content from scratch. Every AI interaction is an interview the writer chooses to accept, reject, or edit.</p>
    <ul>
      <li><strong>Voice Fingerprint</strong> — Embeds every scene the writer has written into pgvector (OpenAI <code>text-embedding-3-large</code>). When the writer asks for a rewrite, we retrieve the 20 most voice-similar scenes as context, then prompt the LLM with "rewrite this line in the voice demonstrated by these examples." Output stays in the writer's register.</li>
      <li><strong>Continuity Reader</strong> — Whole-script pass that flags character inconsistencies, missing setups/payoffs, timeline violations. Chunks the script into scene-granular embeddings, retrieves semantically related scenes for each candidate issue. Rate-limited to 1 pass per session with explicit cost caps in the route handler.</li>
      <li><strong>Scene Surgeon</strong> — Targeted beat-level rewrites that preserve character voice (via Voice Fingerprint) and act position (via the Beats framework).</li>
      <li><strong>Creator Mode AI</strong> — Hook generator, retention-beat analyzer (flags where audience retention drops at 30s / 60s / 90s marks), CTA optimiser. All three operate on the script; none generate from scratch.</li>
    </ul>
    <p>Cost governance: every AI route has a per-user daily cap, a per-request token cap, and an organisation-level monthly ceiling. Cost caps are enforced in the route handler, not in the prompt — because prompt-side cost caps are not real cost caps. Usage metadata is written to a separate telemetry table so I can investigate cost spikes without touching the critical-path database.</p>

    <h3>8. Multi-Platform — Tauri + Capacitor</h3>
    <p>Same codebase, four surfaces. Web (Next.js on Vercel, primary). Mac + Windows (Tauri wrapper, signed, in the stores — studio IT approves installables before URLs). iOS + Android (Capacitor, native container with proper lifecycle hooks).</p>
    <p><strong>Why Tauri over Electron</strong>: 10MB binary vs. 150MB. Native WebView rather than bundled Chromium. <strong>Why Capacitor over React Native</strong>: I already have a web app. React Native means re-implementing the editor in a different rendering model. Capacitor lets me ship the web app as a native container; performance is indistinguishable from native for text editing.</p>

    <h2>AI Design Philosophy</h2>
    <blockquote>The script comes first. Everything else follows. AI amplifies, never authors.</blockquote>
    <p>Not marketing copy — product constraint:</p>
    <ul>
      <li>No one-click "generate my script." Ever. The day Arqo ships that, we have abandoned the human-led ethos and become a commodity LLM wrapper.</li>
      <li>No auto-apply on AI suggestions. Every AI output is a proposal the human accepts, rejects, or edits.</li>
      <li>No AI-authored content in Library examples. The 777-script Library is all human-written work, curated.</li>
      <li>Cost caps enforced at the route layer. Not in prompts. Not in UI. Hard limits the user cannot accidentally bypass.</li>
    </ul>

    <h2>What I Deliberately Didn't Build</h2>
    <ul>
      <li><strong>No thumbnail image generation.</strong> Wrong category. Creators who care already have Photoshop / Canva.</li>
      <li><strong>No video editing inside Arqo.</strong> We stop at the edit's front door — NLE export. The user opens Premiere / FCP / Resolve / CapCut for the cut itself.</li>
      <li><strong>No one-click scene generation. Ever.</strong></li>
      <li><strong>No auto-apply on AI suggestions.</strong> Every output is a proposal.</li>
      <li><strong>No Arabic / mainland China through 2030.</strong> Arabic's RTL + dialectal complexity is a 3–4 week tax per feature; mainland China is a parallel legal + infrastructure build. Both deferred deliberately, not skipped accidentally.</li>
      <li><strong>No native CapCut project writer.</strong> Undocumented format, against their ToS. We ship a clipboard-friendly formatted export instead.</li>
    </ul>
    <p>The brand holds because of what it says no to.</p>

    <h2>Pivots & Trade-offs</h2>
    <ol>
      <li><strong>Paginator off the main thread.</strong> Built main-thread first. At ~40 pages it dropped frames. Moved to a web worker with transferable AST snapshots. Cost: 3 days. Benefit: smooth typing on 120-page scripts.</li>
      <li><strong>FDX writer emits FDX 12 always.</strong> Originally tried to round-trip each version's quirks. Switched to "parse anything, emit current."</li>
      <li><strong>Presence across views, not just Pages.</strong> First version had presence only in Pages. Collaborators in Beats were invisible. Rewrote presence as a cross-view concept.</li>
      <li><strong>Creator tier pulled from "phase 3" to next sprint.</strong> The TAM math made the priority obvious.</li>
      <li><strong>Global from day 1, not English-first.</strong> Retrofitting i18n after English launch is 10× the cost.</li>
    </ol>

    <h2>Performance</h2>
    <ul>
      <li>Editor latency: &lt; 16ms per keystroke on a 2,000-element doc (60fps maintained).</li>
      <li>Paginator cold start: ~200ms on a 120-page doc, runs in worker.</li>
      <li>PDF export: ~1.2s for 120 pages including embedded Courier rendering.</li>
      <li>FDX round-trip: ~80ms for a full parse + re-emit on 120 pages.</li>
      <li>Offline → online sync: ~300ms median for a 50-edit backlog.</li>
      <li>Initial load (web): ~85KB critical path gzipped. Editor code lazy-loaded.</li>
      <li>Mobile Lighthouse target: ≥90 Perf, A11y, Best Practices.</li>
    </ul>

    <h2>What I'd Do Differently</h2>
    <ol>
      <li><strong>Ship the Creator tier on day one.</strong> I built Pro-first and bolted Creator on. Had I started with Creator, product-market-fit signals would have come faster.</li>

      <li><strong>Talk to three WGA writers and three YouTubers before writing the first line of code.</strong> Most of my strong opinions were right. Some were wrong in expensive ways that writer interviews would have caught.</li>

    </ol>

    <h2>Conclusion</h2>
    <p>Arqo is the product I would have wanted to exist when I was 19 and trying to write short films on my phone on the subway. It is the product a WGA writer needs on a Friday night when the studio wants a revised PDF by Monday. It is the product a 22-year-old in Mumbai needs when they're scripting YouTube videos in Hinglish and can't find a tool that respects the code-switch.</p>
    <p>It is also the most technically ambitious thing I have ever built — a custom contenteditable editor, a deterministic paginator, a CRDT-based collab layer, an offline-first sync architecture, an AI retrieval system, four platform targets, nine-language readiness, and a brand ethos that says no to the easy features and yes to the hard ones.</p>
    <blockquote>The surface is production-grade. The discipline is staff-grade. The ambition is to be the category-winner in a space that has not had one for a decade.</blockquote>

    <section>
      <p class="drop-cap"><strong>Aleida is a pseudonymous AI executive assistant</strong> I built in one night to fill the gap between two founders and the eight roles a startup actually needs. She runs as a Claude Code scheduled task that fires four times daily for proactive work, and as a Vercel-deployed Slack webhook for real-time DMs and @-mentions. She has her own Slack identity (<code>@Aleida-Bot</code>), her own Gmail (<code>aleida@tryarqo.com</code>), and her own credentials across Drive, Linear, Calendar, and GitHub. She files Linear tickets, drafts and autonomously sends emails (via an Apps Script trigger that watches for a special subject prefix), creates Drive docs with proper HTML→Doc conversion, schedules Calendar events with Google Meet, and replies to Slack DMs in 5–15 seconds via the Anthropic Messages API tool-use loop.</p>
      <p>Aleida exists because a two-person startup at $400 of total capital deployed cannot afford a $90K/yr human EA, but absolutely needs the function that EA performs — calendar coordination, email drafts, vendor outreach, ticket triage, status reports, weekly recaps. The bet was that 2026-vintage LLMs plus a thoughtful tool surface plus a few clever workarounds (Apps Script for autonomous send when the Gmail MCP is read-only and admin policy blocks OAuth send) would come close enough to a junior EA's output that founder hours would be visibly reclaimed.</p>
      <p>This case study documents the architecture, the brand-aligned email shell mirrored from the Arqo email kit, the Apps Script subject-prefix trick, the cron + webhook hybrid, the tool-use dispatcher, and the scope I deliberately did not give her.</p>
    </section>

    <div class="case-stat-row">
      <div class="case-stat"><div class="n">1<span style="font-size:0.6em;"> night</span></div><div class="l">scaffold to v0.2 — webhook + 4 MCP toolchains live</div></div>
      <div class="case-stat"><div class="n">~$50<span style="font-size:0.6em;">/mo</span></div><div class="l">total infra ceiling — Anthropic + Vercel + Slack + Google free tier</div></div>
      <div class="case-stat"><div class="n">5–15<span style="font-size:0.6em;">s</span></div><div class="l">DM-to-reply latency · Anthropic tool loop in a Vercel serverless function</div></div>

    <h2>The Problem</h2>

    <h3>Two-person startups have a coordination tax that scales linearly with surface area</h3>
    <p>Arqo has two co-founders. One ships product, the other owns creative + community. Between them they need: calendar coordination, vendor outreach, podcast pitches, press follow-up, founding-writer onboarding, formation paperwork tracking, weekly recaps, decision logging, blocker triage, content drafting. None of that work is technically hard. All of it is shaped like <em>"translate a vague intent into a structured action and follow up."</em> That is exactly what executive assistants do.</p>
      <p>A New York EA at the level Arqo would need costs $80–120K/year fully loaded. Roughly ten percent of $400-of-capital startups can afford that hire. The other ninety percent either don't hire — and lose founder hours to ops drag — or hire too early and destroy runway.</p>

    <h3>The "AI agent" startup wave is mostly demos</h3>
    <p>Most of what's marketed as "AI assistant" in 2026 is a chat surface that hands you draft text. That's a writing tool, not an EA. A real EA owns asynchronous workflows: she checks email three times a day on her own initiative, she creates calendar events with attendees and Google Meet links, she files tickets without prompting. The agent stack has the raw capability — Anthropic's tool-use loop, MCP server architecture, webhook event triggers — but very few products stitch them together with the operational discipline an EA needs.</p>

    <blockquote>What if the EA was a scheduled task, not a chatbot? What if the cadence was the design, and the LLM was just the muscle?</blockquote>

    <h2>The Solution</h2>

    <h3>1. Scheduled task as the heartbeat, webhook as the responder</h3>
    <p>Aleida has two execution modes. The <strong>scheduled task</strong> runs four times daily at 10 / 14 / 18 / 22 EST — she triages Gmail, scans Slack DMs, checks Linear, advances backlog work. Most of her productive output happens here. The <strong>webhook</strong> fires on Slack DMs and @-mentions — she replies in 5–15 seconds, calls tools as needed, exits.</p>
    <p>The split is intentional. A 24/7 always-on agent burns API tokens on idle cycles. A pure cron schedule means founders can't ask her something at 3pm and get an answer until 6pm. The hybrid is: she's reactive when you DM her, productive when you don't.</p>

    <h3>2. The Apps Script subject-prefix trigger — autonomous email send despite a read-only Gmail MCP</h3>
    <p>The MCP-provided Gmail integration in Claude Code exposes <code>create_draft</code>, <code>list_drafts</code>, <code>search_threads</code>, <code>get_thread</code>, and label CRUD — but no <code>send_message</code>. By design, intentionally. The Workspace admin policy at Arqo's <code>tryarqo.com</code> domain also blocked OAuth-token-based send paths (this took several hours of debugging to confirm). App Passwords were also disabled at the workspace level.</p>
    <p>The trick: a small Google Apps Script project inside <code>aleida@tryarqo.com</code> runs every minute, scans Drafts, finds anything whose subject starts with <code>[ALEIDA-SEND]</code>, strips the prefix, and calls <code>.send()</code>. Aleida creates the draft with the prefix; the script does the rest.</p>
<pre><code>// Apps Script — runs every 60s as aleida@tryarqo.com
function processDrafts() {
  for (const draft of GmailApp.getDrafts()) {
    const subject = draft.getMessage().getSubject() || '';
    if (!subject.startsWith('[ALEIDA-SEND] ')) continue;
    const cleanSubject = subject.substring('[ALEIDA-SEND] '.length);
    draft.update(to, cleanSubject, plain, options).send();
  }
}</code></pre>
    <p>Latency is up to 60 seconds. The pattern requires zero new OAuth scopes, zero admin policy changes, and survives because Apps Script projects authored inside the user's own account aren't subject to the third-party-app block.</p>
    <blockquote>This is a workaround. It is also categorically the right kind of workaround — built-in primitive composition rather than infrastructure rebuild. Replace it with a real OAuth send when the workspace policy permits; until then, it works.</blockquote>

    <h3>3. Tool-use loop with multi-MCP dispatch</h3>
    <p>The webhook agent loop registers eleven tools across five domains: <code>slack_reply</code> for posting back to threads; <code>linear_create_issue</code> + <code>linear_list_issues</code> for ticket management; <code>gmail_create_draft</code> + <code>gmail_search_threads</code> for email; <code>drive_search_files</code> + <code>drive_create_doc</code> for docs (with proper HTML→Doc conversion via the <code>googleapis</code> SDK <code>convert=true</code> flag the MCP doesn't expose); <code>calendar_list_events</code> + <code>calendar_create_event</code> for scheduling.</p>
    <p>The loop is straight Anthropic Messages API tool-use, max 8 turns, with a single dispatcher that routes by tool-name prefix to the right backend. Errors return as <code>tool_result</code> blocks marked <code>is_error: true</code> so the agent can self-correct. The system prompt is scope-bounded — it explicitly tells Aleida what she can do in real-time and what to defer to the cron.</p>

    <h3>4. Brand-aligned email shell — mirrored from the Arqo email kit</h3>
    <p>Every email Aleida sends from the webhook goes through an HTML shell that mirrors <code>Arqo/lib/email/templates/_layout.ts</code>: cream <code>#f7f4ed</code> background, white card with 2px black border, ARQO wordmark in JetBrains Mono with the ochre <code>#d99d2e</code> square at 18% cap-height, Inter body, italic Fraunces tagline, mono signature.</p>
    <p>This is more than cosmetics. The premise is that an AI EA should look like she works at the company, not like a generic LLM email blast. When Aleida writes to a podcast host or a film school, the email needs to read as Arqo correspondence — not "automated message sent by something resembling an EA." The brand carries the trust.</p>

    <h2>System Architecture</h2>

    <h2>Engineering Deep-Dives</h2>

    <h3>1. Why a cron + webhook hybrid, not always-on agency</h3>
    <p>An always-on agent (loop polling for events, periodic reflection passes, persistent context) is the natural shape for someone reading the agent papers. It also burns ~$100/month minimum even at idle, requires real session memory infrastructure, and creates the "AI doing things you didn't ask for" risk surface.</p>
    <p>A scheduled task fires on a known cadence and runs to completion. Cost is bounded per fire. The work scope is a fresh load of the system prompt + a triage pass + targeted action. No hidden state, no surprise drift. The webhook reuses the same prompt + tool set for real-time response. The overlap between the two execution modes is &gt;90% of the code.</p>

    <h3>2. Apps Script vs. SMTP vs. Resend for autonomous send</h3>
    <table>
      <thead><tr><th>option</th><th>setup</th><th>looks like</th><th>blocked by</th><th>chose?</th></tr></thead>
      <tbody>
        <tr><td>Gmail OAuth send</td><td>10 min</td><td>aleida@tryarqo.com</td><td>Workspace admin policy on third-party apps</td><td class="dash">no</td></tr>
        <tr><td>SMTP + App Password</td><td>5 min</td><td>aleida@tryarqo.com</td><td>App Passwords disabled at workspace level</td><td class="dash">no</td></tr>
        <tr><td>Resend / Postmark API</td><td>30 min + DNS</td><td>noreply@aleida.tryarqo.com</td><td>doesn't appear in Sent folder</td><td class="dash">no</td></tr>
        <tr><td>Apps Script subject-prefix trigger</td><td>5 min</td><td>aleida@tryarqo.com (real Sent folder)</td><td>nothing — runs as the user inside her own account</td><td class="accent">yes</td></tr>
      </tbody>
    </table>
    <p>The Apps Script approach was technically the third path tried. It's also the only one that survives Workspace policy and produces emails that thread correctly with replies from the founders. The 60-second latency is the cost; it's invisible at the EA cadence.</p>

    <h3>3. Tool dispatcher and error handling</h3>
    <p>Each tool returns a JSON-stringified result or a string starting with <code>error:</code>. The dispatcher catches all throws and converts to error tool results so the agent can decide whether to retry, route around, or surface to the user. This pattern is significantly more robust than letting function-level exceptions bubble — the loop continues, the agent reasons about the failure, the user gets a coherent reply instead of a 500.</p>

    <h3>4. Identity setup — why <code>@Aleida-Bot</code>, not <code>@aleida</code></h3>
    <p>Slack auto-suffixes <code>-Bot</code> to a bot's display name when there's an existing human user with the same name. The Arqo workspace had a human <code>aleida</code> user (the auth shell for the email account) before the bot was installed. Result: typing <code>@aleida</code> in Slack autocompletes to the human user, not the bot. Messages to the human go nowhere; the webhook never fires.</p>
    <p>Diagnosing this took three hours of staring at zero events in Vercel observability. The fix is one line: rename the bot user. The lesson — <em>any time a multi-tier identity system has a default-name collision, the failure mode is silent.</em> Worth designing the conflict-detection surface before the next iteration.</p>

    <h2>Staff-Level Decisions</h2>
    <table>
      <thead><tr><th>decision</th><th>chose</th><th>rejected</th><th>why</th></tr></thead>
      <tbody>
        <tr><td>execution model</td><td class="accent">cron + webhook hybrid</td><td>always-on agentic loop</td><td>bounded cost, fresh state per fire, real-time when needed</td></tr>
        <tr><td>autonomous email send</td><td class="accent">Apps Script + subject-prefix</td><td>OAuth send / SMTP / Resend</td><td>only path that survives Workspace policy and lands in real Sent folder</td></tr>
        <tr><td>memory model</td><td class="accent">stateless per fire, file-based long-term</td><td>vector store / persistent context</td><td>predictable behaviour beats sophisticated drift</td></tr>
        <tr><td>email chrome</td><td class="accent">mirror of <code>_layout.ts</code></td><td>generic plaintext</td><td>brand carries trust; AI emails should look like they work here</td></tr>
        <tr><td>doc creation</td><td class="accent">googleapis SDK convert=true</td><td>plaintext upload via MCP</td><td>real Google Docs with native heading/list formatting, not escaped HTML</td></tr>
        <tr><td>autonomy scope</td><td class="accent">founder→founder only autonomous</td><td>all outbound autonomous</td><td>thumbs-up gate on external sends preserves reputation</td></tr>
      </tbody>
    </table>

    <h2>What I Deliberately Didn't Build</h2>
    <ul>
      <li><strong>No long-term memory beyond cron fires.</strong> She has a memory directory she writes to, but each fire reloads the system prompt fresh. No accumulating conversational state. The risk surface of a self-modifying agent is bigger than the productivity upside at this team size.</li>
      <li><strong>No autonomous outbound to non-founders.</strong> Drafts get staged for thumbs-up review in <code>#aleida-general</code> before the <code>[ALEIDA-SEND]</code> prefix is added. The autonomous-send privilege is scoped to founder→founder email only.</li>
      <li><strong>No ability to commit money or sign contracts.</strong> Hard policy in the system prompt, and no payment-rails MCP wired in. She can research vendors and queue a decision; she cannot transact.</li>
      <li><strong>No firing the cron task on demand.</strong> Claude Code's scheduled-tasks API is internal and not callable from a Vercel function. Cadence is fixed at 4×/day. Acceptable; founders can DM the webhook for anything urgent.</li>
      <li><strong>No agentic browsing or web fill-out.</strong> Powerful but brittle and easy to scope-creep. Skipped.</li>
    </ul>
    <p>Like every product, the discipline is at least as important as the feature list.</p>

    <h2>Cost &amp; Performance</h2>
    <ul>
      <li>Anthropic Opus 4.7 per Slack reply: ~2,000 input + 800 output tokens ≈ <strong>$0.05/reply</strong>.</li>
      <li>Vercel function: ~25ms cold-start budget hit on first invoke per region; subsequent &lt;5ms overhead.</li>
      <li>Apps Script trigger: free (within the 6 hr/day quota; we use ~5 min/day).</li>
      <li>Slack API, Linear API: free.</li>
      <li>Google APIs (Gmail / Drive / Calendar) at our volume: free tier.</li>
      <li>Vercel hosting: Pro plan, ~$20/mo amortised across multiple JMNPR Labs apps.</li>
      <li>Total Aleida-attributable monthly: <strong>~$50/mo</strong> at current volume (estimated 1K Slack replies/mo + 4 cron fires/day = ~120 fires).</li>
    </ul>

    <h2>What I'd Do Differently</h2>
    <ol>
      <li><strong>Start with the webhook, not the cron.</strong> The cron task scaffolding came first; the webhook came second. In retrospect, real-time DM responses are the thing founders <em>feel</em> — the cron makes Aleida a teammate, but the DM is the hook. Building DM-first would have shipped the magic earlier.</li>
      <li><strong>Wire the Slack identity earlier.</strong> The bot-vs-user name collision wasted three hours. Always build the identity diagnostic surface first when introducing a new agent into a workspace that already has named users.</li>
      <li><strong>Bake the brand shell from day one.</strong> The first batch of emails Aleida sent were utilitarian plaintext with Unicode dashes. They worked, but they screamed "AI sent this." Mirroring the Arqo email kit chrome the moment the brand existed would have been a 30-minute upfront investment that retroactively raised the perceived quality of every previous send.</li>
      <li><strong>Document the <code>[ALEIDA-SEND]</code> prefix as a load-bearing primitive.</strong> The whole autonomous-send contract depends on a single Apps Script trigger seeing a magic string in the subject. Reliable but obscure — worth a sticker in the repo and a runbook for the inevitable day someone changes the prefix without realising.</li>
    </ol>

    <h2>Conclusion</h2>
    <p>Aleida is a small, opinionated, structurally-bounded AI executive assistant for a two-person startup. She is composed of off-the-shelf primitives (Anthropic API, Slack webhook, Apps Script trigger, MCP-wrapped APIs) glued together with explicit operational discipline (scoped autonomy, brand-aligned chrome, cron+webhook hybrid, scope-bounded prompt). She is not magical; she is well-shaped.</p>
    <p>The bet she represents — that two founders can structurally outpunch a five-person team because the third teammate is a marginal-cost AI rather than a fully-loaded W-2 — is testable in real time. The infra costs ~$50/mo. If she absorbs even five hours of founder time per week, she pays back her infra in roughly three minutes of the founders' time-equivalent.</p>
    <blockquote>The interesting question isn't whether AI EAs work. It's whether you can build one with enough taste and operational discipline that the founders actually trust her output. Brand alignment, scope discipline, and structural humility are doing more of the work than the model is.</blockquote>

      <p>This case study is the receipts: every architecture decision, every place reality pushed back, every thing I deliberately did not build. Total monthly cost ceiling is around <strong>$1.30/mo</strong>. Stack is vanilla HTML, two scripts, and one GitHub Action.</p>

    <h2>The Brief</h2>
    <p>Make something viral about Zohran Mamdani for a personal website. Turn open data into a map people want to screenshot. Don't be creepy. Don't pay for anything. Don't build infrastructure that needs babysitting.</p>
    <p>The promise to the user (and to the mayor's safety) had to do real work in two directions:</p>
    <ul>
      <li><strong>For the audience:</strong> a clean, share-worthy artifact — Mamdani's face on a map, dotted across NYC, with credible sourcing visible on every pin.</li>
      <li><strong>For the subject:</strong> a hard rule that the page never plots a real-time location, never aggregates third-party signals, and never accepts crowd submissions. The mapper is a <em>receipt</em>, not a tracker.</li>
    </ul>

    <h2>The Decisions</h2>

    <h3>Press receipts, not real-time tracking</h3>
    <p>The first thing I argued <em>against</em>. A "where is the mayor right now" page is technically possible from public signals — tweets, press appearances, photo-op spotting — but conflates "public information" with "responsible to publish." Even with stalker-bait flagged off, an aggregated real-time feed of an elected official's location enables the worst use case as cleanly as the best one. So I made it a hard rule: the map only plots what the press office has already <em>published</em>. Every event has a <code>source_url</code> with a verifying quote stored alongside the coordinates. The methodology section on the page says this in plain English.</p>

    <h3>Standalone page, not embedded in the site shell</h3>
    <p>The rest of <code>raghavahuja.com</code> is a portfolio site with a specific masthead, nav, and footer. The mapper is its own thing — a special bulletin from "the cartography desk" — and forcing it into the site chrome muddies both. So <code>mamdani-mapper.html</code> declares its own tokens, its own font stack, its own footer. It can borrow the cobalt palette without inheriting the masthead. The only handshake back to the parent site is a <em>↩ raghavahuja.com</em> link in the footer and a return entry in <kbd>⌘K</kbd>.</p>

    <h3>Cobalt face markers — not the obvious "red pin"</h3>
    <p>The default Mapbox marker is a red pushpin. Boring. The narrative hook of the project is "Mamdani's face on the map," so the marker <em>is</em> his face, in a circle, with cobalt rings that mean different things: solid for past, dashed for upcoming, pulsing green for live. Forward (web-sourced, predicted) events are visually distinct from past (press-sourced, confirmed) events — the dashed border carries the epistemic difference. The legend is honest: <em>upcoming · web</em> vs <em>earlier · press</em>.</p>

    <h2>Architecture</h2>
    <p>Two scrapers, both running in one GH Action workflow. Both write to the same <code>events.json</code>.</p>

    <h3>Scraper A · the press receipt (every 5 minutes)</h3>
    <ol>
      <li><strong>Discovery:</strong> the nyc.gov mayor's-office sitemap is public XML and contains every press-release URL in the form <code>/news/YYYY/MM/&lt;slug&gt;</code>. We pull it once per run.</li>
      <li><strong>Skip-cache:</strong> URLs we've already extracted (or already ruled out) live in <code>mamdani/skip-cache.json</code>. Most runs evaluate <em>zero</em> new URLs and exit cleanly with $0 spent on Claude.</li>
      <li><strong>Pre-filter:</strong> obvious non-event titles (Executive Orders, "Releases Plan," "Statement on…") get skipped before any LLM call.</li>
      <li><strong>Extraction:</strong> what survives gets handed to Claude Haiku 4.5 with a tool-use schema. The model returns <code>{ was_physically_present, venue, neighborhood, borough, kind }</code>. If <code>was_physically_present === false</code>, we skip and remember the URL.</li>
      <li><strong>Geocoding:</strong> Mapbox's geocoder, with <em>neighborhood</em> and <em>borough</em> passed as hints. This is the fix that turned "La Marqueta" geocoding to a random street in Brooklyn into "La Marqueta, East Harlem, Manhattan." The hint matters enormously for ambiguous proper nouns.</li>
    </ol>

    <h3>Scraper B · the forward signal (once a day)</h3>
    <p>Mamdani's office, unlike his predecessors', does not publish a daily public schedule. Politico's NY Playbook newsletter (which historically would have) is fully blocked at the web layer — 403 on every direct request, Wayback's most recent snapshot is two months stale, no public RSS. Email pipeline is real but a multi-hour build with user-side setup.</p>
    <p>So Scraper B uses Claude with the built-in <code>web_search_20260209</code> + <code>web_fetch_20260209</code> server-side tools. One API call per day. The system prompt asks for forward events from a whitelist of NYC outlets (Gothamist, NY1, NY Times Metro, City &amp; State, RPA press releases, etc.) with strict criteria: specific venue, specific date inside a 14-day window, public source URL, source explicitly states the mayor will attend. The model returns a structured array via tool use.</p>
    <p>An exhaustive one-time pass with Sonnet 4.6 found two high-confidence events for the next 14 days — a 9/11 Memorial wreath-laying with King Charles III on April 29, and a mainstage talk at the 2026 RPA Assembly on May 1. The daily Haiku run keeps watching.</p>

    <h2>Challenges</h2>

    <h3>The press feed isn't a press feed</h3>
    <p>I designed Scraper A around an Adams-era convention: the Mayor's Office posts a daily <em>"Mayor's Public Schedule"</em> press release that lists where he'll be that day. Mamdani's office doesn't do this. They publish event-specific releases <em>after</em> events. The whole "where will he be tomorrow" framing was structurally impossible from this source. The pivot was painful but the right call: ship the receipt of where he's been, layer forward signal in separately.</p>

    <h3>nyc.gov is JS-rendered</h3>
    <p>The press-release index page (<code>/mayors-office/news</code>) is rendered client-side via Adobe Experience Manager + Coveo search. A static <code>fetch()</code> sees an empty shell. <em>Individual</em> press release pages are static, but you can't list them via the index. The fix was the sitemap — XML, public, and updated within minutes of new releases.</p>

    <h3>Geocoding the wrong "La Marqueta"</h3>
    <p>First clean Claude run produced 14 events with great extraction quality but ugly geocoding: "La Marqueta" pinned in Canarsie, Brooklyn. "Gracie Mansion" pinned to Mansion Street in the Bronx. "WNYC" pinned to a street in Brooklyn. The fix was passing the borough and neighborhood Claude already extracted into the geocoder query. Disambiguation goes from rough to precise the moment the model and the geocoder share context.</p>

    <h3>Rate limits at $5 of input tokens</h3>
    <p>The first end-to-end run burned through the 50K input-tokens-per-minute org cap on Haiku and 30 of 60 calls hit 429s. Three small fixes: a 2.5s sleep between calls, a 429-with-retry-after backoff that retries up to twice, and the skip-cache (so subsequent runs do far fewer calls). Steady-state is now under the cap by orders of magnitude.</p>

    <h3>The "today" view was empty by design</h3>
    <p>Earliest version defaulted the map to "today." But press releases lag 1–3 days, so "today" was almost always empty — the page rendered as broken. Fix: rolling 7-day window as the default for past events, and a new <em>upcoming</em> toggle (the now-default) that shows today + next 14 days. Honest empty-state copy explains the lag in plain English so first-time visitors don't think the page is dead.</p>

    <h2>What I deliberately did not build</h2>
    <ul>
      <li><strong>Crowd submissions.</strong> User-flagged: "fuck crowd submissions, people are creeps." Removed from scope before a line of code.</li>
      <li><strong>Twitter / X scraping.</strong> $5–200/month for a marginal-value signal. Mamdani's @ tweets are policy, not schedule. The mayor's office tweets are post-hoc. Skipped.</li>
      <li><strong>Real-time inference.</strong> No "he just left X" extrapolation, no aggregation across signals, no clever guesses. The map is a receipt; if it can't cite a published source, it doesn't plot.</li>
      <li><strong>The Politico email pipeline.</strong> Built a runbook for it. Decided to ship the web-search forward signal first and revisit if traction warrants the additional infra.</li>
    </ul>

    <h2>Cost engineering</h2>
    <div class="case-stat-row">
      <div class="case-stat"><div class="n">$0.30<span style="font-size:0.6em;">/mo</span></div><div class="l">press scraper · skip-cache means most runs do zero llm calls</div></div>
      <div class="case-stat"><div class="n">$1.00<span style="font-size:0.6em;">/mo</span></div><div class="l">forward scraper · daily Haiku call with web_search/web_fetch</div></div>
      <div class="case-stat"><div class="n">$0.00<span style="font-size:0.6em;">/mo</span></div><div class="l">infra · static page on Vercel free tier · GH Actions free for public repos</div></div>
    </div>
    <p>The skip-cache is the most important single line of code in the project. Without it, 288 runs/day × 50 candidate URLs = 14,400 LLM evaluations per day. With it, the 30-second steady-state job evaluates 0–3 new URLs and exits. The cache is a JSON file in the same repo — committed alongside <code>events.json</code> on every change.</p>

    <h2>Pivots and trade-offs</h2>
    <ul>
      <li><strong>Forward-looking → receipt:</strong> the original "where will he be" pitch became "where has he been," with a small upcoming column on the side. The narrative is stronger this way: the map IS the value, the share moment is the heatmap of his time.</li>
      <li><strong>Email pipeline → web search:</strong> 2–3 hour build with user setup vs. a one-API-call daily search. The web search runs in the existing GH Action; nothing new to maintain. Same source quality on the high end (RPA press releases, Gothamist), worse on the low end. Acceptable.</li>
      <li><strong>Opus → Haiku:</strong> on the user's first cost-anxiety prompt I downgraded the per-press-release extractor from Opus 4.7 to Haiku 4.5. 5x cheaper, accuracy still good for this task because the prompt is highly structured and the field of decisions is narrow.</li>
      <li><strong>Multi-call agentic loop → single tool call:</strong> the forward scraper does one Messages API call with <code>web_search</code>, <code>web_fetch</code>, and a custom <code>record_forward_events</code> tool. No round-trip looping from the client side. Claude does the agentic work server-side and returns one structured array.</li>
    </ul>

    <h2>What's live now</h2>
    <ul>
      <li>The standalone page at <a href="https://raghavahuja.com/mamdani-mapper" target="_blank" rel="noopener">raghavahuja.com/mamdani-mapper</a> with cobalt design, custom topbar, and its own favicon (the face).</li>
      <li>14 past events plotted across all 5 boroughs, plus 2 high-confidence upcoming events (King Charles wreath-laying, RPA Assembly).</li>
      <li>The borough tracker — <em>"who gets the most mamdani?"</em> — with a face-stack visualization for the last 30 days.</li>
      <li>Click-to-zoom: click a row or face → map zooms to the venue with the popup, click off → flies back to the overview.</li>
      <li>Three share-card generators (today, this week, heatmap) that produce branded 1200×630 PNGs from the canvas.</li>
      <li>A GH Action firing every 5 minutes for the press scraper and once a day at 14:00 UTC for the forward scraper.</li>
    </ul>

    <h2>What I'd do differently</h2>
    <ul>
      <li><strong>Build the email pipeline.</strong> The exhaustive Sonnet sweep found 2 events for a 14-day window. Politico's NY Playbook would catch a few more — specifically the small town halls and community appearances that don't get an indie-press writeup. Cloudflare Email Routing → Worker → GitHub commit is ~3 hours of work plus a one-time email subscription. If the page gets meaningful traction, that's the next move.</li>
      <li><strong>Pad the system prompt above the cache floor.</strong> Haiku's prompt cache requires &gt; 4096 tokens. My system prompt + tool schema clocks in around 3.5K, so caching never triggers. With more few-shot examples I could push above the floor and get ~90% off the per-call cost. Trivial savings at current volume; matters at 100x scale.</li>
      <li><strong>Forward events as a separate visual layer.</strong> Right now they live in the same <code>events.json</code> with a flag. A separate <code>forward.json</code> would let a future "preview" view diff what changed since yesterday — the kind of thing that turns a static map into a daily destination.</li>
    </ul>

    <h2>Conclusion</h2>
    <p>One night, vanilla static page, two cron jobs, $1.30/month. The building constraint that made it work was the negative one: don't build a tracker, build a receipt. That single line of editorial discipline is what kept the scope honest, the cost low, and the page shippable in one session. The face on the map does the rest.</p>

    <blockquote>This is a one-night project. One static page, one Mapbox tile, one hand-written scraper, one daily Claude run, and a GitHub Action that commits the receipt to the repo. Built for sport.</blockquote>
  </template>

    <section>
      <p class="drop-cap"><strong>Futbolis.live is a real-time pub-finder for football fans</strong> I shipped solo in three weeks of evenings, using AI-assisted tooling. The full stack — product vision, visual system, geocoding engine, caching architecture, mobile and desktop experiences, motion design — was built end-to-end by one person.</p>
      <p>The headline engineering achievements are not decorative. A 60-second server-side cache on the <code>/api/matches</code> route means the site serves 100,000 concurrent users on a $19/month base-tier sports API, because every user hits one API call per minute regardless of traffic. A four-tier geocoding fallback ensures every match plots correctly even when the upstream API doesn't provide stadium coordinates. A mobile architecture built from scratch (not a responsive desktop) gives phone users a bottom-sheet carousel that feels native.</p>
    </section>

    <div class="case-stat-row">
      <div class="case-stat"><div class="n">$19<span style="font-size:0.55em;">/mo</span></div><div class="l">flat infra cost at 100k concurrent users</div></div>
      <div class="case-stat"><div class="n">3<span style="font-size:0.6em;"> weeks</span></div><div class="l">solo build, nights &amp; weekends</div></div>
      <div class="case-stat"><div class="n">4<span style="font-size:0.6em;">-tier</span></div><div class="l">geocoding fallback, 95%+ accuracy</div></div>
    </div>

    <h2>The Problem</h2>

    <h3>The geographic disconnect</h3>
    <p>Modern football apps — FlashScore, FotMob, ESPN — present matches as data rows. They're optimized for speed and density, but they strip away something fundamental: the sense that football is a global, living phenomenon.</p>
    <p>At any given moment, there might be 50+ professional matches happening simultaneously across the planet. A user checking scores sees:</p>
<pre><code>Slovakia 3. Liga - East
SPO 4 - 1 RAS</code></pre>
    <p>What they don't feel is that this match is happening in <em>Spišské Podhradie</em>, a town of 3,800 people at the foot of a medieval castle in eastern Slovakia. That geographic context — the human context, the texture of the global game — is completely lost.</p>

    <h3>The 2026 opportunity</h3>
    <p>The 2026 FIFA World Cup will be the first hosted across three countries (USA, Canada, Mexico). Matches will span five time zones simultaneously. The list paradigm cannot carry geographic scale. The map can.</p>

    <h3>The ad-tech problem</h3>
    <p>Every major football score site is increasingly hostile — gambling ads, sign-up walls, dark-pattern cookie banners. Futbolis is ad-free by design and will stay that way. The point is not to monetize a captive audience. The point is to remember what the internet felt like when it was built for people.</p>

    <blockquote>What if scores weren't consumed — they were explored? What if checking live matches felt like surveying a living, breathing planet of football activity?</blockquote>

    <h2>The Solution</h2>

    <h3>Macro-to-micro navigation</h3>
    <p>The core UX pattern is progressive disclosure through geography:</p>
    <ul>
      <li><strong>World view (macro)</strong> — entire globe with clustered match markers. Density indicates activity: South America glows during evening kickoffs, Europe during afternoon matches.</li>
      <li><strong>Region view (meso)</strong> — individual match markers, showing team codes (e.g., "STR vs OLI") and pulsing to indicate live status.</li>
      <li><strong>City view (micro)</strong> — selecting a match triggers a fly-to animation that drops the user into the host city. Bold environmental typography overlays the city name (e.g., "Capiata, Paraguay" in 120px white text) to ground the experience geographically.</li>
    </ul>

    <h3>Mobile: a complete rethink, not a shrunk-down desktop</h3>
    <p>Desktop patterns fail on mobile. A sidebar consumes too much real estate. Vertical scrolling competes with map interaction. Most sports apps ship mobile as "responsive desktop" and pay for it in user retention.</p>
    <p>Solution: a bottom-sheet carousel. Horizontal swipeable cards anchored to the bottom of the screen. Swiping a card into center focus triggers a map fly-to automatically. Tapping an active card expands it to a full detail view, hiding others to reduce cognitive load.</p>
    <blockquote>Building mobile as a separate architecture (a distinct MobileCarousel component, not a media-query on the sidebar) is the decision that made the phone experience feel native. It's more code. It was the right call.</blockquote>

    <h2>Engineering Deep-Dive</h2>

    <h3>The $19/month fix — intelligent edge caching</h3>
    <p>The football data API charges per request. A viral World Cup moment could mean 100,000 users hitting the site simultaneously — thousands of dollars in overage fees per hour. On a solo, ad-free project, that is bankruptcy.</p>
<pre><code>// app/api/matches/route.ts
export const revalidate = 60

export async function GET() {
  const response = await fetch(
    'https://api-football-v1.p.rapidapi.com/v3/fixtures?live=all',
    {
      headers: {
        'X-RapidAPI-Key': process.env.RAPIDAPI_KEY!,
        'X-RapidAPI-Host': 'api-football-v1.p.rapidapi.com',
      },
      next: { revalidate: 60 },
    }
  )
  const payload = await response.json()
  return Response.json(transformFixtures(payload))
}</code></pre>
    <p>Every user on the site hits the Vercel Edge cache, not the upstream API. The Edge fetches fresh data once per 60 seconds and serves the same cached payload to everyone in between. At 100,000 concurrent users, the upstream API sees one request per minute. Cost scales with time, not traffic.</p>
    <blockquote>Most engineers would reach for a Redis cache or a Cloudflare Worker. I specifically chose Next.js's built-in revalidate because it's the minimum viable caching layer — no extra infrastructure, no new failure mode, no additional bill.</blockquote>

    <h3>The 4-tier geocoding fallback</h3>
    <p>The API provides stadium names but not coordinates. <em>"Estadio Erico Galeano"</em> means nothing to Mapbox without lat/lng. Without coordinates, we cannot plot the match. Without plotting, no product.</p>
<pre><code>async function resolveMatchLocation(match: Match): Promise&lt;ResolvedLocation&gt; {
  // Tier 1: Stadium coordinates cache (~500 major venues)
  const stadiumCoords = STADIUM_DATABASE[match.venue.id]
  if (stadiumCoords) return { ...stadiumCoords, source: 'stadium', approximate: false }

  // Tier 2: City-level geocoding via Mapbox
  const cityCoords = await geocodeCity(match.venue.city, match.country)
  if (cityCoords) return { ...cityCoords, source: 'city', approximate: true }

  // Tier 3: Country centroid
  const countryCoords = COUNTRY_CENTROIDS[match.countryCode]
  if (countryCoords) return { ...countryCoords, source: 'country', approximate: true }

  // Tier 4: National team logic (international friendlies)
  if (isNationalTeam(match.homeTeam)) {
    const capitalCoords = CAPITAL_CITIES[match.homeTeam.country]
    return { ...capitalCoords, source: 'national-team', approximate: true }
  }

  return { ...FALLBACK_COORDS, source: 'unresolved', approximate: true }
}</code></pre>
    <p>Each match carries a <code>locationApproximate</code> boolean. The UI displays "Location is approximate / Ubicación aproximada" when true. <em>Lying to the user about precision is worse than admitting imprecision.</em></p>
    <p>Building the 500-stadium database was ~2 days of manual curation. The top 500 venues account for ~70% of match volume on any given day. Quality concentrates in the top of the distribution. Invest there first.</p>

    <h3>Mapbox marker lifecycle</h3>
    <p>Markers are created and destroyed as matches start and end. Improper cleanup leaks memory over a long session — exactly the kind of bug that only manifests on a user watching a full Saturday card.</p>
<pre><code>const markersRef = useRef&lt;Map&lt;string, mapboxgl.Marker&gt;&gt;(new Map())

useEffect(() =&gt; {
  const activeIds = new Set(matches.map(m =&gt; m.id))

  // Remove markers for ended matches
  for (const [id, marker] of markersRef.current) {
    if (!activeIds.has(id)) {
      marker.remove()
      markersRef.current.delete(id)
    }
  }

  // Add markers for new matches
  for (const match of matches) {
    if (!markersRef.current.has(match.id)) {
      const marker = buildMarker(match).addTo(map)
      markersRef.current.set(match.id, marker)
    }
  }
}, [matches, map])</code></pre>
    <p>Mapbox markers are imperative DOM nodes owned by the Mapbox runtime. You cannot declare them with JSX and trust React's reconciliation. The ref-based diff-and-reconcile pattern is the only correct way to manage them.</p>

    <h2>Visual System</h2>
    <h3>Colour palette</h3>
    <ul>
      <li><strong>Background</strong> <code>#0a0a0a</code> — reads as "premium, respects your eyes at night"</li>
      <li><strong>Card surfaces</strong> <code>rgba(255,255,255,0.05)</code> with backdrop-blur — glassmorphic, legible over any map terrain</li>
      <li><strong>Primary accent</strong> amber <code>#f59e0b</code> — warm, not alert-red</li>
      <li><strong>Live indicator</strong> green <code>#22c55e</code> — pulsing dot animation</li>
    </ul>

    <h3>Motion</h3>
    <ul>
      <li><strong>Fly-to</strong> 1.5s ease-out with pitch tilt for cinematic entry.</li>
      <li><strong>Live pulse</strong> 2s infinite on marker dots — slow enough to feel like a heartbeat, not a warning light.</li>
      <li><strong>Goal celebration</strong> confetti + "GOAL!" flash on expanded cards only.</li>
      <li><code>prefers-reduced-motion</code> bypass disables fly-to (jumps directly) and pulse.</li>

    <h2>Staff-Level Decisions</h2>
    <table>
      <thead><tr><th>decision</th><th>chose</th><th>rejected</th><th>why</th></tr></thead>
      <tbody>
        <tr><td>data source</td><td class="accent">$19/mo API + aggressive caching</td><td>premium tiers ($200+/mo)</td><td>caching is free; API tier is not</td></tr>

        <tr><td>user accounts</td><td class="accent">none for v1</td><td>sign-in, favorites</td><td>ship anonymous; add when notifications actually exist</td></tr>
      </tbody>
    </table>

    <h2>Performance</h2>
    <ul>
      <li><strong>Edge caching</strong> — API responses cached 60s, flat cost regardless of traffic.</li>
      <li><strong>Code splitting</strong> — mobile and desktop components loaded conditionally. Phone users don't download sidebar code, desktop users don't download carousel code.</li>
      <li><strong>Bundle size</strong> — ~180KB gzipped initial load. Critical path ~85KB.</li>
      <li><strong>Mobile Lighthouse</strong> — 92 Perf · 98 A11y · 100 Best Practices.</li>
      <li><strong>FCP</strong> — ~1.1s on median mobile connection. TTI ~2.4s — map tiles drive most of the remainder.</li>
    </ul>

    <h2>What I'd Do Differently</h2>
    <ol>
      <li><strong>Proper i18n from day 1.</strong> Inline bilingual strings will be refactor tax when Portuguese and French land.</li>
      <li><strong>Analytics on day 1.</strong> I shipped without it and lost a week of usage signal. Cheap upfront, painful to retrofit.</li>
      <li><strong>Stadium database collaboratively.</strong> A simple "suggest a correction" form in the UI would have let the community close gaps over time.</li>
      <li><strong>Structured event logging from the start.</strong> Goals, cards, subs — logging them from day 1 would have given retention data to tune the celebration moments against.</li>
    </ol>

    <h2>Conclusion</h2>
    <p>Futbolis.live is a proof of concept for a broader thesis: that solo design engineers with the right tooling can ship production-scale consumer products in weeks, not quarters, without sacrificing craft. The visual system is confident. The caching architecture is minimum-viable. The mobile experience is built, not adapted. The ad-free promise is architecturally protected (no user accounts, no tracking, no monetization hooks to rip out later).</p>
    <blockquote>The product is small. The craft is not. That is the point.</blockquote>

  <template id="case-zulily">
    <section>
      <p class="drop-cap"><strong>Senior UX designer, Growth &amp; Personalization at Zulily</strong>, Apr 2021 – Aug 2022. Designed and shipped the algorithmic logic behind a 16M+ daily personalized email ecosystem — a modular system that assembles a unique email per subscriber against real-time inventory and behavioral signals.</p>
    </section>

    <div class="case-stat-row">
      <div class="case-stat"><div class="n">16M+</div><div class="l">unique daily email assemblies, zero manual curation</div></div>
      <div class="case-stat"><div class="n">+14%</div><div class="l">click-through-rate vs. control</div></div>
      <div class="case-stat"><div class="n">+45s</div><div class="l">session duration uplift</div></div>
    </div>

    <h2>The 6 AM Problem</h2>
    <p>Zulily launches thousands of new SKUs every morning at 6 AM. With 16M+ subscribers, manual curation was impossible. The legacy email was a static grid — same sort order for everyone, no intelligence behind the layout. We needed a system that could assemble a unique email for every single user, every morning, against fresh inventory.</p>

    <h2>Persona-Driven Architecture</h2>
    <p>Two archetypes drove the system: <em>Abby</em>, the power user who wants to breeze through new events; <em>Cindy</em>, the deal hunter who only cares about savings and gets overwhelmed when content isn't organized. Research surfaced a third signal — millennial moms had broadened consideration sets to 4+ brands a month and were taking longer to decide. Clear categorization, not aggressive promotion, was the move.</p>

    <h2>Modular System — 15+ Interchangeable Blocks</h2>
    <p>Reframed the email from a static grid into a stack of interchangeable modules. Global blocks (event promo, campaign promo, blog, game) and personalization blocks (greeting, sort, abandon-cart CTA, wishlist link, buy-again) compose into a unique daily layout per user.</p>

    <h3>Two-tier trigger system</h3>
    <p>A dual-layer trigger system balances global promotions against individual user signals:</p>
    <ul>
      <li><strong>Global</strong> — event promo, campaign promo, program promo, blog, game.</li>
      <li><strong>Personal</strong> — name known, shopping history, abandon cart, wishlist, buy-again.</li>
    </ul>
    <p>Signals map to modules: <em>name known</em> → greeting; <em>shopping history</em> → personalized sort; <em>abandon cart</em> → "go to cart" CTA; <em>wishlist</em> → link to list.</p>

    <h2>Logic Governance — The Engineering Handoff</h2>
    <p>Because this was revenue-critical, ambiguity was the risk. I partnered with the ML team on a "Logic Governance" document — a flow diagram that mapped every user state to a module hierarchy, defined the guardrails for inventory depletion, and specified fallback states for low-data users. It became the single source of truth for engineering.</p>
<pre><code>type UserState = 'hot_lead' | 'warm' | 'cold_start';

const getModuleHierarchy = (user: User): Module[] =&gt; {
  const state = classifyUserState(user);

  switch (state) {
    case 'hot_lead':
      // abandoned cart = highest urgency
      return [TriggerModule, PersonalizedSort, GlobalPromo];

    case 'cold_start':
      // no history = graceful degradation
      return [GlobalTrending, EditorialBlog, AppEngagement];

    default:
      return getPersonalizedStack(user);
  }
};</code></pre>

    <h2>App Engagement — Streak Mechanics</h2>
    <p>The App Engagement module introduced streak mechanics — users see progress toward a 7-day goal with a "Continue Run" CTA. Per the strategy matrix, this slot is "low urgency": gamification rewards rather than pushes. Personalized greeting (<em>"Hi Hafiz, Happy Wednesday"</em>) builds trust through recognition before the product grid hits.</p>

    <h2>Year in Review — Personalization at Annual Scale</h2>
    <p>Extended the engine into a yearly recap email — favorite brand, most-saved category, biggest purchase — closing with a Zulily+ subscription upsell. Users who saw their savings visualized were primed to consider the membership value prop.</p>

    <h2>Outcomes</h2>
    <ul>
      <li>Double-digit lift against control inside the first quarter (<strong>+14% CTR, +45s session</strong>).</li>
      <li>Reversed a long-term decline in open rates by serving algorithmically relevant content.</li>
      <li>16M+ unique email assemblies daily with zero manual curation.</li>
      <li>Modular architecture enabled rapid A/B testing of new module combinations without engineering rework.</li>
    </ul>

    <h2>Front-End &amp; Pilots</h2>
    <p>During a staffing gap I shipped a revamped onboarding funnel in React end-to-end — owned the handoff, the implementation, and the post-launch experiment analysis. Separately, partnered with data science on a personalization ranking pilot; defined the interaction model and the evaluation UX so analysts could inspect model outputs against human judgment.</p>

       MIND FRAMEWORK
       ============================================== -->
  <template id="case-mind">
    <section>
      <p class="drop-cap"><strong>MIND — Motivational Interface &amp; Nudge Design</strong> — is a behavioral framework I authored to quantify user hesitation in high-stakes flows and pick the interface response that resolves it. It's the operating system underneath the checkout, insurance, and discovery work at EF, and the lens I use when reviewing any decision-heavy surface.</p>
      <p>This page is the conceptual writeup. Implementation specifics — token tables, event schemas, the BDI heatmap — are available on request.</p>
    </section>

    <h2>The Core Equation</h2>
<pre><code>CtB = (Clarity + Trust + Motivation) − (Friction × 2) − Risk</code></pre>
    <p>Confidence-to-Book quantifies a user's readiness to commit. Friction carries 2× negative weight — that's the load-bearing insight. A well-meant explanation that adds a sentence to read can erase a guarantee that took a quarter to negotiate.</p>

    <h2>The Physics of Decision Making</h2>
    <p>Four psychological forces the framework operationalizes:</p>
    <ul>
      <li><strong>Cognitive efficiency.</strong> Humans are cognitive misers. We gravitate toward defaults, simple comparisons, pre-curated options. <em>Implication:</em> curate the path; don't just provide choices.</li>
      <li><strong>Loss aversion.</strong> Fear of loss is 2–3× more powerful than the desire for gain. <em>Implication:</em> frame around "avoiding missed opportunities," not "earning rewards."</li>
      <li><strong>Social orientation.</strong> In moments of uncertainty, humans look to the herd. <em>Implication:</em> social proof at the exact moment of hesitation, not as decoration on a landing page.</li>
      <li><strong>Commitment momentum.</strong> Each small "yes" makes the next one easier. <em>Implication:</em> sequence the asks; never lead with the heaviest.</li>
    </ul>

    <h2>The 5 Pillars of Influence</h2>
    <p>Each pillar maps to a question in the user's head. The framework forces the team to answer all five before shipping a flow.</p>
    <ol>
      <li><strong>Orientation</strong> — "Do I understand what this is and why it matters?" Clarity headers, context frames, pricing anchors, feature grids.</li>
      <li><strong>Motivation</strong> — "Do I want this?" Dynamic social proof, scarcity signals, value highlights, emotional content.</li>
      <li><strong>Decision architecture</strong> — "Is this choice easy?" Smart defaults, comparison grids, best-value labels, progressive commitment.</li>
      <li><strong>Trust &amp; reassurance</strong> — "Do I feel safe committing?" Risk-reversal guarantees, transparency blocks, review panels, authority signals.</li>
      <li><strong>Action</strong> — "Is now the right moment to act?" Verb-first CTAs, momentum locks, micro-reassurance, progress indicators.</li>
    </ol>

    <h2>Behavioral Design Tokens</h2>
    <p>Influence patterns encoded into the design system as tokens, so a developer can adjust psychological intensity without re-spec'ing the page.</p>
<pre><code>type UrgencyLevel = 'high' | 'medium' | 'low';
type TrustLevel   = 'verified_partner' | 'standard';
type PriceAnchor  = 'strike_through' | 'comparative';
type CTAFraming   = 'commit' | 'risk_free' | 'soft_save';

interface BehavioralTokens {
  'behavioral.urgency':       UrgencyLevel;       // color + copy intensity
  'behavioral.socialproof':   1 | 2 | 3 | 4;      // prominence of validation signals
  'behavioral.trust':         TrustLevel;         // visual weight of guarantees
  'behavioral.price.anchor':  PriceAnchor;        // value-context display
  'behavioral.cta.framing':   CTAFraming;         // linguistic frame on actions
}

const checkoutTokens: BehavioralTokens = {
  'behavioral.urgency':      'high',
  'behavioral.socialproof':  4,
  'behavioral.trust':        'verified_partner',
  'behavioral.price.anchor': 'strike_through',
  'behavioral.cta.framing':  'risk_free',
};</code></pre>

    <h2>Behavioral Drop-Off Index (BDI)</h2>
    <p>BDI diagnoses where the psychological chain breaks in a funnel — a per-step score that surfaces leaks before A/B testing burns weeks on the wrong variable.</p>
<pre><code>BDI(step) = (Alignment + Motivation + Trust + (5 − Friction)) / 4

≥ 4.0   strong alignment, low resistance
2.5–4.0 optimization opportunity
≤ 2.5   behavioral leak — high abandon risk</code></pre>
    <p>Worked example: checkout step scores 2.4. Hover maps show hesitation on policy text. Diagnosis: trust leak. Rx: surface guarantees, add a "reserve risk-free" microcopy line, force total-price transparency above the fold. The framework names the leak before the team names the fix.</p>

    <h2>The Ethical Ethos</h2>
    <p>Four non-negotiables. Ethics here isn't a constraint — it's a performance multiplier, because users can smell a manipulated funnel and the brand pays the bill on the back end.</p>
    <ul>
      <li><strong>Clarity over persuasion.</strong> Users must understand the choice and its consequences.</li>
      <li><strong>Confidence over pressure.</strong> Nudge toward certainty; reject false urgency.</li>
      <li><strong>Momentum over friction.</strong> Accelerate through smart defaults, not dark patterns.</li>
      <li><strong>Integrity over manipulation.</strong> Scarcity, social proof, and data must be real.</li>
    </ul>

    <h2>Where It's Deployed</h2>
    <p>MIND is the framework underneath the EF checkout rebuild (+$4.2M / yr), the Deals Tracker pricing intelligence layer (+12.4% CtB, +8.2% conversion), and the insurance redesign (+10% take-rate). It's also the lens used in design reviews across acquisition, retention, and discovery surfaces.</p>
    <blockquote>The framework is a forcing function. If a team can't articulate which pillar a screen is solving for, the screen isn't ready to ship.</blockquote>
