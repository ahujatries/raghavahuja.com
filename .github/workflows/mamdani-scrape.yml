name: mamdani-scrape

# Every 5 minutes. The skip-cache (mamdani/skip-cache.json) means most runs do
# 0 Claude calls — only NEW press release URLs since the last run get evaluated.
# Steady-state cost: ~$0.30/month assuming 2-3 new releases/day.
# Commits ./mamdani/events.json + skip-cache.json if changed. Vercel auto-redeploys on push.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    concurrency:
      group: mamdani-scrape
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run press-feed scraper (every run)
        env:
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/scrape-mamdani-schedule.mjs

      # Forward-schedule scraper (Claude + web_search + web_fetch).
      # Only runs when the minute is :00 of the hour AND the hour is 14 UTC
      # (≈ 10am ET) — i.e. once per day. Cheap (~$1/mo).
      - name: Should run forward scraper?
        id: should_forward
        run: |
          if [[ "$(date -u +%H:%M)" == "14:00" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run forward-schedule scraper (daily ~10am ET)
        if: steps.should_forward.outputs.run == 'true'
        env:
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/scrape-forward-schedule.mjs

      - name: Commit if changed
        run: |
          git config user.name "mamdani-mapper-bot"
          git config user.email "bot@raghavahuja.com"
          if [[ -n "$(git status --porcelain mamdani/events.json mamdani/skip-cache.json)" ]]; then
            git add mamdani/events.json mamdani/skip-cache.json
            git commit -m "data(mamdani): refresh schedule $(date -u +%FT%TZ)"
            git push
          else
            echo "no changes to events.json or skip-cache.json"
          fi
