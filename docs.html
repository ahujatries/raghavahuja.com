  <!-- ==============================================
       Confidence-to-Book (CtB)
       ============================================== -->
  <template id="doc-ctb">
    <section>
      <p class="drop-cap"><strong>Confidence-to-Book</strong> is a five-stage mental model for advisor-assisted booking funnels. It plots where a prospect sits between <em>curiosity</em> and <em>committed booking</em>, and names the specific doubt that has to fall before they move to the next stage.</p>
      <p>I authored CtB in 2023 for an advisor-assisted EdTech funnel. It's been used to redesign high-GMV conversion surfaces and is the shared vocabulary for advisor-flow reviews on the teams I've used it with. Specific metrics and case specifics live in the <a href="case-study.html?slug=ef">gated case study</a>.</p>
    </section>

    <h2>Why another funnel model</h2>
    <p>AIDA, AARRR, and the classic funnel all describe the <em>shape</em> of conversion. They don't describe what is actually happening inside the prospect. Advisor-assisted products live or die on trust, and the trust gradient doesn't look like the funnel — it oscillates. A prospect can be in consideration, fall back to awareness when a new worry surfaces, then vault to commitment when an advisor reframes the worry.</p>
    <p>CtB models trust as <strong>confidence</strong> and prescribes the advisor's job at each stage: not to push to the next step, but to resolve the doubt that belongs to the current step.</p>

    <h2>The five stages</h2>
    <ol>
      <li><strong>Curious</strong> — the prospect is investigating. Dominant doubt: "is this thing worth any of my time?" Advisor's job: reduce the cost of exploration. Surface artefacts they can browse without committing.</li>
      <li><strong>Considering</strong> — the prospect can name what they want. Dominant doubt: "does this thing fit me specifically?" Advisor's job: personalize. Show how it fits their context, not the generic case.</li>
      <li><strong>Comparing</strong> — the prospect has identified alternatives. Dominant doubt: "am I picking the right one?" Advisor's job: show the honest trade-off. Do not pretend the alternatives don't exist.</li>
      <li><strong>Committed</strong> — the prospect wants to proceed. Dominant doubt: "what happens if I'm wrong?" Advisor's job: make the downside visible and survivable. Talk refunds, flexibility, support.</li>
      <li><strong>Booked</strong> — the decision is made. Dominant doubt: "did I get what I paid for?" Advisor's job: proactive confirmation, not passive delivery.</li>
    </ol>

    <blockquote>The funnel leaks where the advisor is answering the wrong stage's question.</blockquote>

    <h2>How it ships</h2>
    <p>CtB shows up in product in three places:</p>
    <ul>
      <li><strong>Content surfaces</strong> match the stage. Curious gets browse-able collections. Comparing gets side-by-side, honest, including competitor names. Committed gets refund policy, change-flexibility, support quality.</li>
      <li><strong>Instrumentation</strong> tags every event with the stage it serves. "Brochure PDF download" is a Curious event; "advisor chat opened" is a Considering or Comparing event. Mixing them corrupts the funnel chart.</li>
      <li><strong>Advisor scripts</strong> are written per-stage. A Committed prospect asked a Curious question ("what's included?") is being re-anxious — the script acknowledges the loop, doesn't ignore it.</li>
    </ul>

    <h2>What it isn't</h2>
    <p>CtB is a <em>product + service</em> framework, not a sales framework. It describes how a team designs around the prospect's evolving doubts, not how a seller pushes a deal. In teams where sales runs the funnel, CtB is the design team's way to insist the advisor is in service of the prospect, not of the quota.</p>
    <p>It also isn't linear. Prospects regress. A Considering prospect who discovers a new risk regresses to Curious on that risk. The model lets you name the regression without treating it as failure.</p>

    <h2>When to use it</h2>
    <ul>
      <li>Any advisor-assisted purchase funnel. Education, real estate, insurance, financial services, complex B2B.</li>
      <li>Any product where trust, not information, is the limiting reagent.</li>
      <li>Any team that needs a shared vocabulary between designers, advisors, and analysts so "conversion" means the same thing in every meeting.</li>
    </ul>

    <h2>When not</h2>
    <ul>
      <li>Transactional commerce under $50. Trust is sufficient; CtB is over-engineered.</li>
      <li>Developer / technical tools. The doubts are different (integration complexity, escape hatches) and AIDA works fine.</li>
      <li>Anywhere the advisor doesn't exist. Self-serve SaaS onboarding is better described by JTBD.</li>
    </ul>
  </template>

  <!-- ==============================================
       MIND
       ============================================== -->
  <template id="doc-mind">
    <section>
      <p class="drop-cap"><strong>MIND</strong> is a synthesis method for turning a week of mixed-method research — interviews, survey open-fields, support tickets, telemetry — into a one-page artefact that a team can argue against.</p>
      <p>It is the research-readout I reach for when I have more than a hundred raw inputs and less than a day to find the shape in them.</p>
    </section>

    <h2>The four steps</h2>
    <ol>
      <li><strong>M — Mine.</strong> Pull every raw input into one surface. Interview notes, survey lines, ticket text. No editing. No paraphrasing. Verbatim only. One card per input, timestamped, attributed. If it didn't happen, it doesn't go on the wall.</li>
      <li><strong>I — Inventory.</strong> Sort the cards into tentative groups without naming them yet. Let the groupings be awkward; resist the urge to interpret. A group with 40 cards and a group with 3 cards are both data. Count them. Write the count on the group.</li>
      <li><strong>N — Name the tensions.</strong> Look at the boundaries between groups. Where do two groups contradict each other? That contradiction is the <em>tension</em> — the thing the product has to resolve. Name the tension in a single sentence. Not the topic, the tension.</li>
      <li><strong>D — Decide the bet.</strong> For each tension, write the bet the product is going to make. Not the feature. The bet — the hypothesis that if we resolve this tension one particular way, the downstream metric moves. Every bet has an owner and a deadline.</li>
    </ol>

    <blockquote>Most research reads are Mine and Inventory, then stop. The insight is not in the clusters. It is in the boundaries between them.</blockquote>

    <h2>The one-page artefact</h2>
    <p>The output is a single page with four sections: the inputs (count + sources), the groups (with card counts), the tensions (one sentence each), the bets (one sentence each, with owner + deadline). Anyone reading it should be able to argue against a bet without re-reading the raw cards — that's the test.</p>

    <h2>Anti-patterns</h2>
    <ul>
      <li><strong>Paraphrasing in Mine.</strong> The moment you start "translating what they really meant," you have corrupted the inventory. Verbatim is cheap and honest.</li>
      <li><strong>Naming groups before you've inventoried them.</strong> Forces the data into your priors. Stay in awkward-unnamed-groups longer than feels comfortable.</li>
      <li><strong>Writing <em>features</em> in Decide.</strong> A feature is a solution. A bet is a hypothesis. "Add a size filter" is a feature; "users will convert more when they feel certain about fit before adding to cart" is a bet.</li>
      <li><strong>No owner, no deadline.</strong> A bet without an owner is a wish. The method insists on both.</li>
    </ul>

    <h2>Where it fails</h2>
    <p>MIND is built for mixed-method research with &gt;50 inputs across &gt;2 source types. Below that scale, it's over-engineered — a good two-hour discussion does the same work. It also struggles when research has been scheduled around a decision that was already made; no synthesis method survives motivated sampling.</p>
  </template>

    </ul>

    <h2>Design direction</h2>
    <p>The brand is <em>Direction A · Dark</em> — burnt ink paper (<code>#15110D</code>), warm cream text (<code>#EDE3CE</code>), terracotta accent (<code>#E86A4E</code>), candlelit radial glow. The type choice does the editorial lifting; colour is used as information, not decoration.</p>
    <p>The positioning is DIRECTION.md §1: <em>the code is part of the craft, not a handoff</em>. Every surface — live activity, view-source drawers, terminal-404, command palette — is a proof of that line.</p>

    <ul>
      <li><code>⌘K</code> opens the command palette. Fuzzy search, routes, commands, easter eggs.</li>

      <li><code>g</code> (hold) shows the 12-col grid overlay. <code>G</code> pins it.</li>

      <li>Type <code>chai</code> in ⌘K for an ASCII masala chai.</li>
      <li>The 404 is a real terminal. <code>ls</code>, <code>cd work/arqo</code>, <code>whoami</code> all work.</li>
    </ul>

    <h2>Performance</h2>
    <ul>
      <li><strong>Fonts preloaded</strong> on every page. No render-blocking CDN round-trip.</li>
      <li><strong>No framework overhead.</strong> Initial HTML on the home page is ~14KB, CSS ~23KB, JS ~23KB — all uncompressed.</li>

      <li><strong>Vercel edge cache</strong> serves everything else.</li>
    </ul>

    <h2>Privacy</h2>
    <ul>
      <li><strong>Analytics</strong> — Plausible. Cookieless, no cross-site tracking, no PII, no fingerprint. Just page views + a handful of named events (<code>cmdk:open</code>, <code>vs:open</code>, <code>theme:toggle</code>, <code>case:read-complete</code>, <code>ef:unlock-*</code>, <code>doc:open</code>).</li>
      <li><strong>No third-party embeds</strong> beyond Plausible and the GitHub events API.</li>
      <li><strong>localStorage</strong> stores your theme preference and whether you've dismissed the view-source hint. That's it.</li>
      <li><strong>sessionStorage</strong> caches the GitHub events payload (60s) and, if you've unlocked the EF case study, the decrypted HTML for that tab.</li>

  <!-- ==============================================
       ADR: $19/mo edge-caching
       ============================================== -->
  <template id="doc-adr-edge-cache">
    <section>
      <p class="drop-cap"><strong>Decision</strong> — Serve 100k+ concurrent users of Futbolis.live on a $19/mo base-tier sports API using Next.js's built-in route-level <code>revalidate</code>. Reject Redis, reject Cloudflare Workers, reject a custom caching layer.</p>
    </section>

    <h2>Status</h2>
    <p><span style="color: var(--accent);">Accepted</span> · 2026-03 · shipped to production on futbolis.live.</p>

    <h2>Context</h2>
    <p>API-Football charges per request. A viral moment during the World Cup could mean 100,000 users hitting the site simultaneously. At one request per user, that is thousands of dollars in overage fees per hour. On a solo, ad-free project, that is bankruptcy.</p>
    <p>The upstream data refreshes every 60 seconds anyway — faster than that would not serve more recent data, and slower would feel stale.</p>

    <h2>Decision</h2>
<pre><code>// app/api/matches/route.ts
export const revalidate = 60

export async function GET() {
  const response = await fetch(
    'https://api-football-v1.p.rapidapi.com/v3/fixtures?live=all',
    {
      headers: {
        'X-RapidAPI-Key': process.env.RAPIDAPI_KEY!,
        'X-RapidAPI-Host': 'api-football-v1.p.rapidapi.com',
      },
      next: { revalidate: 60 },
    }
  )
  const payload = await response.json()
  return Response.json(transformFixtures(payload))
}</code></pre>
    <p>Every user on the site hits the Vercel Edge cache, not the upstream API. The Edge fetches fresh data once per 60 seconds and serves the same cached payload to everyone in between.</p>
    <p>At 100,000 concurrent users, the upstream API sees one request per minute. Cost scales with time, not traffic. $19/month is a flat ceiling, not a floor.</p>

    <h2>Alternatives considered</h2>
    <ul>
      <li><strong>Redis in front of the API.</strong> Works, but adds a managed service to the bill, a new failure mode, and a warm-up cost on cold starts. Not worth it when Next.js already does this.</li>
      <li><strong>Cloudflare Worker with KV.</strong> Similar trade. Adds provider dependency outside Vercel. Debugging at 2 AM would involve another dashboard.</li>
      <li><strong>Custom Node cache (LRU in-memory).</strong> Broken the moment the app runs in more than one region. Vercel's edge is multi-region by default.</li>
      <li><strong>Client-side polling with shared WebSocket broadcast.</strong> More code, more ops, and still needs an upstream cache to be affordable.</li>
    </ul>

    <h2>Consequences</h2>
    <h3>Positive</h3>
    <ul>
      <li>Cost is flat up to Vercel's free-tier edge-cache bandwidth. Past that, marginal cost stays tiny because the cached response is small.</li>
      <li>No new infrastructure. No new failure mode. No new bill.</li>
      <li>Invalidation is trivially correct — the cache expires every 60s on its own.</li>
    </ul>
    <h3>Negative</h3>
    <ul>
      <li>Data is at most 60 seconds stale. Acceptable for this product; would not be for bet-per-second trading UIs.</li>
      <li>We don't have a manual "purge cache" button for operator intervention. If the upstream returns garbage, garbage persists for up to 60s.</li>
    </ul>

    <h2>When to revisit</h2>
    <ul>
      <li>If upstream rate-limits become an issue at our free-tier bandwidth — unlikely, but monitor.</li>
      <li>If we ever need user-specific match data (followed teams). Then we'd split per-user queries off the globally-cached route.</li>
      <li>If we move off Vercel. <code>revalidate</code> is a Next.js convention; the equivalent on another host would need to be designed explicitly.</li>
    </ul>

    <blockquote>Most engineers would reach for Redis or a Worker. I specifically chose Next.js's built-in revalidate because it's the minimum viable caching layer — no extra infrastructure, no new failure mode, no additional bill. The simplicity <em>is</em> the feature.</blockquote>
  </template>

      },
      'direction-a': {
        n: '03', title: 'Direction A · Dark', kind: 'brand',
        subtitle: 'The brand direction this site is set in. Burnt ink, warm cream, terracotta, Instrument Serif.',
        meta: { written: '2026-04', status: 'locked', length: '~1,000 words' },
      },
      'colophon': {
        n: '04', title: 'Colophon — raghavahuja.com', kind: 'colophon',
        subtitle: 'How this site is built. Stack, direction, interactions, perf, a11y.',
        meta: { written: '2026-04', status: 'maintained', length: '~1,100 words' },
      },
      'adr-edge-cache': {
        n: '05', title: 'ADR — $19/mo edge cache', kind: 'adr',
        subtitle: 'Serve 100k+ concurrent users on a base-tier sports API via Next.js revalidate. Reject Redis.',
        meta: { written: '2026-03', status: 'accepted · in production · futbolis.live', length: '~800 words' },
      },
    };
    const ORDER = ['ctb', 'mind', 'direction-a', 'colophon', 'adr-edge-cache'];

    function renderShelf() {
      const shelf = document.getElementById('shelf');
      shelf.innerHTML = ORDER.map((slug, i) => {
        const d = DOCS[slug];
        return `<a class="book" href="docs.html?d=${slug}" data-kind="${d.kind}" aria-label="${d.title}">
          <span class="kind">${d.kind}</span>
          <span class="title">${d.title}</span>
          <span class="n">${d.n}</span>
        </a>`;
      }).join('');
    }

    function renderReader(slug) {
      const d = DOCS[slug];
      if (!d) { window.location.replace('/doesnotexist'); return; }
      document.getElementById('view-shelf').hidden = true;
      document.getElementById('shelf-wrap').hidden = true;
      const reader = document.getElementById('view-reader');
      reader.hidden = false;

      document.getElementById('doc-kicker').textContent = `${d.kind} · no. ${d.n}`;
      document.getElementById('doc-title').textContent = d.title;
      document.getElementById('doc-subtitle').textContent = d.subtitle;
      document.getElementById('doc-spine').textContent = `${d.kind} · no. ${d.n} · ${d.title.toLowerCase()}`;
      document.title = `${d.title} · docs · raghav ahuja`;

      const meta = document.getElementById('doc-meta');
      meta.innerHTML = [
        ['written', d.meta.written],
        ['status', d.meta.status],
        ['length', d.meta.length],
        ['kind', d.kind],
      ].map(([k, v]) => `<div><div class="k">${k}</div><div>${v}</div></div>`).join('');

      const tpl = document.getElementById(`doc-${slug}`);
      const body = document.getElementById('doc-body');
      if (tpl) body.appendChild(tpl.content.cloneNode(true));
      if (window.plausible) window.plausible('doc:open', { props: { slug } });

      // prev / next
      const i = ORDER.indexOf(slug);
      const prev = i > 0 ? ORDER[i - 1] : null;
      const next = i < ORDER.length - 1 ? ORDER[i + 1] : null;
      const nav = document.getElementById('doc-nav');
      const pL = prev
        ? `<a href="docs.html?d=${prev}"><span class="label">← previous</span>${DOCS[prev].title}</a>`
        : `<a href="docs.html"><span class="label">← shelf</span>back to the library</a>`;
      const nL = next
        ? `<a href="docs.html?d=${next}"><span class="label">next →</span>${DOCS[next].title}</a>`
        : `<a href="docs.html" style="color: var(--accent);"><span class="label">end</span>back to the library →</a>`;
      nav.innerHTML = pL + nL;
    }

    const slug = new URLSearchParams(location.search).get('d');
    if (slug) renderReader(slug);
    else renderShelf();
  </script>

  <script src="site.js" defer></script>
</body>
</html>
